<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0f1e">
<title>NSE Scanner</title>
<style>
:root {
  --bg:        #0a0f1e;
  --bg2:       #111827;
  --bg3:       #1a2235;
  --border:    rgba(255,255,255,0.08);
  --text:      #e8edf5;
  --muted:     #7b8ba5;
  --accent:    #4f9cf9;
  --prime:     #22d3a0;
  --prime-bg:  rgba(34,211,160,0.09);
  --prime-bdr: rgba(34,211,160,0.28);
  --hold:      #f59e0b;
  --hold-bg:   rgba(245,158,11,0.09);
  --hold-bdr:  rgba(245,158,11,0.28);
  --watch:     #60a5fa;
  --watch-bg:  rgba(96,165,250,0.09);
  --watch-bdr: rgba(96,165,250,0.28);
  --book:      #fb923c;
  --book-bg:   rgba(251,146,60,0.09);
  --book-bdr:  rgba(251,146,60,0.28);
  --avoid:     #f87171;
  --avoid-bg:  rgba(248,113,113,0.09);
  --avoid-bdr: rgba(248,113,113,0.28);
  --up:        #22d3a0;
  --dn:        #f87171;
  --radius:    13px;
  /* FIXED: Calibri for body, Consolas for numbers */
  --sans: 'Calibri', 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
  --mono: 'Consolas', 'Courier New', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.55;
  min-height: 100dvh;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}
button { cursor: pointer; border: none; background: none; color: inherit; font: inherit; -webkit-tap-highlight-color: transparent; }

/* ── Header ── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg); border-bottom: 1px solid var(--border);
  padding: 12px 16px 10px;
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.logo { font-family: var(--sans); font-size: 15px; font-weight: 700; letter-spacing: 0.04em; color: var(--accent); }
.scan-date { font-size: 12px; color: var(--muted); }
.refresh-btn { width: 32px; height: 32px; border-radius: 9px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 17px; transition: transform 0.3s; }
.refresh-btn.spinning { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Tabs ── */
.tabs { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 1px; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { flex-shrink: 0; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; border: 1px solid var(--border); background: var(--bg2); color: var(--muted); transition: all 0.15s; white-space: nowrap; font-family: var(--sans); }
.tab.active { color: var(--text); border-color: transparent; }
.tab[data-sit="all"].active   { background: var(--bg3); }
.tab[data-sit="prime"].active { background: var(--prime-bg); border-color: var(--prime-bdr); color: var(--prime); }
.tab[data-sit="hold"].active  { background: var(--hold-bg);  border-color: var(--hold-bdr);  color: var(--hold); }
.tab[data-sit="watch"].active { background: var(--watch-bg); border-color: var(--watch-bdr); color: var(--watch); }
.tab[data-sit="book"].active  { background: var(--book-bg);  border-color: var(--book-bdr);  color: var(--book); }
.tab[data-sit="avoid"].active { background: var(--avoid-bg); border-color: var(--avoid-bdr); color: var(--avoid); }
.tab .cnt { display: inline-block; margin-left: 4px; background: rgba(255,255,255,0.13); border-radius: 10px; padding: 0 5px; font-size: 11px; font-weight: 700; }

/* ── Summary bar ── */
.summary { display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); }
.summary::-webkit-scrollbar { display: none; }
.stat { flex-shrink: 0; background: var(--bg2); border: 1px solid var(--border); border-radius: 11px; padding: 8px 13px; text-align: center; min-width: 70px; }
.stat-val { font-family: var(--mono); font-size: 16px; font-weight: 700; line-height: 1; }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; font-family: var(--sans); }
.v-green { color: var(--prime); }
.v-amber { color: var(--hold); }
.v-blue  { color: var(--watch); }

/* ── Content ── */
.content { flex: 1; padding: 10px 14px 88px; }

/* ── Section headers ── */
.sh { display: flex; align-items: center; gap: 8px; margin: 14px 0 8px; padding: 11px 14px; border-radius: var(--radius); font-size: 14px; font-weight: 700; font-family: var(--sans); }
.sh-icon { font-size: 17px; }
.sh-body { flex: 1; }
.sh-action { display: block; font-size: 12px; font-weight: 400; opacity: 0.75; margin-top: 2px; }
.sh-count { font-family: var(--mono); font-size: 12px; opacity: 0.65; }
.sh-prime { background: var(--prime-bg); border: 1px solid var(--prime-bdr); color: var(--prime); }
.sh-hold  { background: var(--hold-bg);  border: 1px solid var(--hold-bdr);  color: var(--hold); }
.sh-watch { background: var(--watch-bg); border: 1px solid var(--watch-bdr); color: var(--watch); }
.sh-book  { background: var(--book-bg);  border: 1px solid var(--book-bdr);  color: var(--book); }
.sh-avoid { background: var(--avoid-bg); border: 1px solid var(--avoid-bdr); color: var(--avoid); }

/* ── Cards ── */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 14px 14px 18px; margin-bottom: 10px; cursor: pointer; position: relative; overflow: hidden; opacity: 0; animation: slideUp 0.3s ease forwards; -webkit-tap-highlight-color: transparent; transition: border-color 0.15s; }
.card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
.card[data-sit="prime"]::before { background: var(--prime); }
.card[data-sit="hold"]::before  { background: var(--hold); }
.card[data-sit="watch"]::before { background: var(--watch); }
.card[data-sit="book"]::before  { background: var(--book); }
.card[data-sit="avoid"]::before { background: var(--avoid); }
.card:active { opacity: 0.82; transform: scale(0.99); }
.card.open { border-color: rgba(255,255,255,0.14); }
@keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

/* Card top */
.card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.sym-wrap { flex: 1; }
.sym {
  font-family: var(--sans); font-size: 18px; font-weight: 700;
  letter-spacing: 0.02em; cursor: pointer;
  display: inline-flex; align-items: center; gap: 5px;
}
.sym:hover .sym-icon { opacity: 1; }
.sym-icon { font-size: 13px; opacity: 0.5; transition: opacity 0.15s; }
.badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
.bdg { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 10px; border: 1px solid; font-family: var(--sans); }
.bdg-prime { color: var(--prime); border-color: var(--prime-bdr); background: var(--prime-bg); }
.bdg-hold  { color: var(--hold);  border-color: var(--hold-bdr);  background: var(--hold-bg); }
.bdg-watch { color: var(--watch); border-color: var(--watch-bdr); background: var(--watch-bg); }
.bdg-book  { color: var(--book);  border-color: var(--book-bdr);  background: var(--book-bg); }
.bdg-avoid { color: var(--avoid); border-color: var(--avoid-bdr); background: var(--avoid-bg); }
.bdg-str   { color: #f59e0b; border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.09); }
.bdg-w1    { color: var(--prime); border-color: var(--prime-bdr); background: var(--prime-bg); }
.bdg-w2    { color: #fbbf24; border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.09); }
.bdg-w3    { color: var(--avoid); border-color: var(--avoid-bdr); background: var(--avoid-bg); }

/* Score ring */
.score-ring { width: 48px; height: 48px; border-radius: 50%; border: 2.5px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
.score-ring[data-s="9"],.score-ring[data-s="10"] { border-color: var(--prime); }
.score-ring[data-s="8"]  { border-color: #34d399; }
.score-ring[data-s="7"]  { border-color: #60a5fa; }
.score-ring[data-s="6"]  { border-color: #818cf8; }
.score-ring[data-s="5"]  { border-color: var(--hold); }
.score-ring[data-s="4"]  { border-color: var(--book); }
.score-ring[data-s="1"],.score-ring[data-s="2"],.score-ring[data-s="3"] { border-color: var(--avoid); }
.sv { font-family: var(--mono); font-size: 15px; font-weight: 700; line-height: 1; }
.sm { font-size: 9px; color: var(--muted); margin-top: 1px; }

/* Price row */
.price-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.price { font-family: var(--mono); font-size: 21px; font-weight: 700; }
.rs { font-size: 13px; color: var(--muted); }
.ret { font-family: var(--sans); font-size: 12px; font-weight: 600; padding: 3px 8px; border-radius: 8px; }
.ret-p { color: var(--up); background: rgba(34,211,160,0.11); }
.ret-n { color: var(--dn); background: rgba(248,113,113,0.11); }
.ret-lbl { font-size: 10px; color: var(--muted); }

/* Progress */
.prog-wrap { margin-bottom: 10px; }
.prog-lbls { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 4px; font-family: var(--sans); }
.prog-track { height: 6px; border-radius: 3px; background: var(--bg3); position: relative; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--avoid) 0%, var(--hold) 50%, var(--prime) 100%); }
.prog-dot { position: absolute; top: 50%; transform: translate(-50%,-50%); width: 10px; height: 10px; border-radius: 50%; background: #fff; border: 2px solid var(--bg); box-shadow: 0 0 5px rgba(255,255,255,0.5); }

/* Levels */
.levels { background: var(--bg3); border-radius: 9px; padding: 10px 12px; margin-bottom: 10px; }
.lrow { display: flex; align-items: center; font-size: 12px; font-family: var(--sans); }
.lrow+.lrow { margin-top: 6px; }
.llbl { color: var(--muted); font-size: 11px; min-width: 34px; }
.lval { font-family: var(--mono); font-size: 13px; font-weight: 600; }
.lsl { color: var(--avoid); }
.lt1 { color: var(--watch); }
.lt2 { color: var(--prime); }
.lchg { font-size: 11px; color: var(--muted); margin-left: 4px; }
.ml { margin-left: auto; }

/* Signal pills */
.sigs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
.pill { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); color: var(--muted); font-family: var(--sans); }
.pill.ok  { color: var(--prime); border-color: var(--prime-bdr); background: var(--prime-bg); }
.pill.mid { color: var(--hold);  border-color: var(--hold-bdr);  background: var(--hold-bg); }
.pill.bad { color: var(--avoid); border-color: var(--avoid-bdr); background: var(--avoid-bg); }

/* Meta row */
.meta { display: flex; gap: 12px; font-size: 12px; color: var(--muted); flex-wrap: wrap; font-family: var(--sans); }
.mval { color: var(--text); font-weight: 600; }

/* Expand toggle hint */
.expand-hint { text-align: center; font-size: 11px; color: var(--muted); margin-top: 8px; opacity: 0.6; font-family: var(--sans); }

/* Expanded section */
.extra { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.card.open .extra { display: block; }

/* Prime TV box */
.tv-box { background: rgba(34,211,160,0.05); border: 1px solid var(--prime-bdr); border-radius: 10px; padding: 11px 13px; margin-bottom: 10px; }
.tv-title { font-size: 12px; font-weight: 700; color: var(--prime); margin-bottom: 8px; font-family: var(--sans); }
.tv-item { font-size: 12px; color: var(--muted); display: flex; gap: 6px; margin-bottom: 5px; font-family: var(--sans); line-height: 1.4; }
.tv-item::before { content: '○'; color: var(--prime); flex-shrink: 0; margin-top: 1px; }

/* AVOID reason box */
.avoid-box { background: rgba(248,113,113,0.06); border: 1px solid var(--avoid-bdr); border-radius: 10px; padding: 11px 13px; margin-bottom: 10px; }
.avoid-title { font-size: 12px; font-weight: 700; color: var(--avoid); margin-bottom: 8px; font-family: var(--sans); }
.avoid-item { font-size: 12px; color: var(--muted); display: flex; gap: 6px; margin-bottom: 5px; font-family: var(--sans); line-height: 1.4; }
.avoid-item::before { content: '×'; color: var(--avoid); flex-shrink: 0; font-weight: 700; }
.avoid-note { font-size: 11px; color: var(--avoid); opacity: 0.8; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--avoid-bdr); font-family: var(--sans); }

/* HOLD guidance box */
.hold-box { background: var(--hold-bg); border: 1px solid var(--hold-bdr); border-radius: 10px; padding: 11px 13px; margin-bottom: 10px; }
.hold-title { font-size: 12px; font-weight: 700; color: var(--hold); margin-bottom: 8px; font-family: var(--sans); }
.hold-item { font-size: 12px; color: var(--muted); display: flex; gap: 6px; margin-bottom: 5px; font-family: var(--sans); }
.hold-item::before { content: '→'; color: var(--hold); flex-shrink: 0; }

/* Chart panel */
.chart-panel { display: none; position: fixed; left: 0; right: 0; bottom: 0; top: 0; background: var(--bg); z-index: 500; flex-direction: column; }
.chart-panel.open { display: flex; }
.chart-header { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--border); gap: 10px; flex-shrink: 0; }
.chart-sym { font-family: var(--sans); font-size: 18px; font-weight: 700; flex: 1; }
.chart-close { width: 34px; height: 34px; border-radius: 9px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 18px; }
.chart-tabs { display: flex; gap: 6px; padding: 10px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.chart-tab { padding: 5px 14px; border-radius: 16px; font-size: 12px; font-weight: 600; background: var(--bg2); border: 1px solid var(--border); color: var(--muted); font-family: var(--sans); }
.chart-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.chart-body { flex: 1; overflow: hidden; }
.chart-body iframe { width: 100%; height: 100%; border: none; }
.chart-note { padding: 8px 16px; font-size: 11px; color: var(--muted); text-align: center; border-top: 1px solid var(--border); flex-shrink: 0; font-family: var(--sans); }

/* Bottom nav */
.bnav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); display: flex; padding: 6px 8px; padding-bottom: max(6px, env(safe-area-inset-bottom)); gap: 2px; z-index: 200; }
.nb { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 6px 2px; border-radius: 10px; font-size: 11px; color: var(--muted); transition: all 0.15s; -webkit-tap-highlight-color: transparent; font-family: var(--sans); font-weight: 500; }
.nb .ni { font-size: 21px; line-height: 1; }
.nb.on { background: var(--bg3); color: var(--accent); }

/* Misc */
.empty { text-align: center; padding: 52px 24px; color: var(--muted); }
.empty-ico { font-size: 44px; margin-bottom: 14px; }
.empty-ttl { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 8px; font-family: var(--sans); }
.empty-dsc { font-size: 13px; line-height: 1.65; font-family: var(--sans); }
.loader { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 14px; color: var(--muted); font-family: var(--sans); }
.lring { width: 38px; height: 38px; border-radius: 50%; border: 3px solid var(--bg3); border-top-color: var(--accent); animation: spin 0.8s linear infinite; }
.fade { animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

/* Guide styles */
.g-section { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px; margin-bottom: 11px; }
.g-title { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 11px; font-family: var(--sans); }
.g-row { display: flex; gap: 10px; margin-bottom: 9px; font-size: 13px; font-family: var(--sans); }
.g-num { font-family: var(--mono); font-size: 12px; color: var(--muted); min-width: 18px; padding-top: 2px; }
.g-step { font-weight: 700; }
.g-desc { color: var(--muted); font-size: 12px; line-height: 1.5; margin-top: 2px; }
.g-sit { display: flex; gap: 10px; margin-bottom: 12px; padding: 11px; border-radius: 10px; font-family: var(--sans); }
.g-sit-icon { font-size: 20px; flex-shrink: 0; }
.g-sit-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
.g-sit-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>

<!-- Header -->
<div class="header" id="mainHeader">
  <div class="header-top">
    <div class="logo">NSE SCANNER</div>
    <div class="scan-date" id="scanDate">—</div>
    <button class="refresh-btn" id="refreshBtn" onclick="reload()">↻</button>
  </div>
  <div class="tabs" id="tabsRow">
    <button class="tab active" data-sit="all"   onclick="setFilter('all')">All</button>
    <button class="tab"        data-sit="prime"  onclick="setFilter('prime')">🎯 Prime</button>
    <button class="tab"        data-sit="hold"   onclick="setFilter('hold')">💰 Hold</button>
    <button class="tab"        data-sit="watch"  onclick="setFilter('watch')">👀 Watch</button>
    <button class="tab"        data-sit="book"   onclick="setFilter('book')">⚠️ Book</button>
    <button class="tab"        data-sit="avoid"  onclick="setFilter('avoid')">🚫 Avoid</button>
  </div>
</div>

<!-- Summary bar -->
<div class="summary" id="summaryBar" style="display:none"></div>

<!-- Content -->
<div class="content" id="content">
  <div class="loader">
    <div class="lring"></div>
    <div>Loading scan data…</div>
  </div>
</div>

<!-- Chart panel (full screen overlay) -->
<div class="chart-panel" id="chartPanel">
  <div class="chart-header">
    <div class="chart-sym" id="chartSym">—</div>
    <div style="display:flex;gap:6px">
      <a id="tvLink" href="#" target="_blank"
         style="padding:6px 12px;background:var(--accent);color:#fff;border-radius:8px;font-size:12px;font-family:var(--sans);font-weight:600;text-decoration:none">
        Open TV ↗
      </a>
      <button class="chart-close" onclick="closeChart()">✕</button>
    </div>
  </div>
  <div class="chart-tabs">
    <button class="chart-tab active" onclick="setChartRange('1M',this)">1M</button>
    <button class="chart-tab" onclick="setChartRange('3M',this)">3M</button>
    <button class="chart-tab" onclick="setChartRange('6M',this)">6M</button>
    <button class="chart-tab" onclick="setChartRange('1Y',this)">1Y</button>
  </div>
  <div class="chart-body" id="chartBody"></div>
  <div class="chart-note">
    Chart: TradingView · Tap "Open TV ↗" for HMA indicators & full analysis
  </div>
</div>

<!-- Bottom nav -->
<div class="bnav">
  <button class="nb on"  id="nbScan"  onclick="switchView('scan')">
    <span class="ni">📊</span><span>Scan</span>
  </button>
  <button class="nb"     id="nbPrime" onclick="switchView('prime')">
    <span class="ni">🎯</span><span>Prime</span>
  </button>
  <button class="nb"     id="nbList"  onclick="switchView('list')">
    <span class="ni">☰</span><span>List</span>
  </button>
  <button class="nb"     id="nbGuide" onclick="switchView('guide')">
    <span class="ni">📖</span><span>Guide</span>
  </button>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const DATA_URL  = 'https://raw.githubusercontent.com/JayeshSRathod/nse-scanner/main/telegram_last_scan.json';
const CACHE_KEY = 'nse_scan_v3';

// ── Telegram WebApp ───────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#0a0f1e'); tg.setBackgroundColor('#0a0f1e'); }

// ── State ──────────────────────────────────────────────────
let allStocks    = [];
let scanDate     = '';
let activeFilter = 'all';
let activeView   = 'scan';
let expandedSym  = null;
let chartSym     = null;
let chartRange   = '3M';

// ── Situation config ──────────────────────────────────────
const SIT = {
  prime: { icon:'🎯', label:'Prime Entry',   action:'Enter today — confirm on TradingView', cls:'sh-prime', bdg:'bdg-prime' },
  hold:  { icon:'💰', label:'Hold & Trail',  action:'Already in move — trail your stop loss up', cls:'sh-hold',  bdg:'bdg-hold'  },
  watch: { icon:'👀', label:'Watch Closely', action:'Good setup — one signal missing. Check tomorrow.', cls:'sh-watch', bdg:'bdg-watch' },
  book:  { icon:'⚠️', label:'Book Profits', action:'Move maturing — consider booking 50-100%', cls:'sh-book',  bdg:'bdg-book'  },
  avoid: { icon:'🚫', label:'Avoid Now',     action:'Weak signal or bearish — skip today', cls:'sh-avoid', bdg:'bdg-avoid' },
};
const SIT_ORDER = ['prime','hold','watch','book','avoid'];

// ═══════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════
async function loadData(force=false) {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  try {
    if (!force) {
      const c = sessionStorage.getItem(CACHE_KEY);
      if (c) { const p = JSON.parse(c); if (p.stocks?.length) { renderAll(p); btn.classList.remove('spinning'); return; } }
    }
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    sessionStorage.setItem(CACHE_KEY, JSON.stringify(d));
    renderAll(d);
  } catch(e) {
    const c = sessionStorage.getItem(CACHE_KEY);
    if (c) renderAll(JSON.parse(c)); else renderSample();
  } finally { btn.classList.remove('spinning'); }
}

function reload() { sessionStorage.removeItem(CACHE_KEY); loadData(true); }

// RENDER
// ═══════════════════════════════════════════════════════════
function renderAll(data) {
  allStocks = data.stocks || [];
  scanDate  = data.scan_date || '';
  try {
    const d  = new Date(scanDate + 'T00:00:00');
    document.getElementById('scanDate').textContent =
      d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  } catch(e) {}
  updateBadges();
  renderSummary();
  renderCards();
}

function updateBadges() {
  const c = {all: allStocks.length};
  allStocks.forEach(s => { const sit=s.situation||'watch'; c[sit]=(c[sit]||0)+1; });
  document.querySelectorAll('.tab').forEach(t => {
    const sit=t.dataset.sit, n=c[sit]||0;
    t.querySelectorAll('.cnt').forEach(b=>b.remove());
    if(n>0) { const b=document.createElement('span'); b.className='cnt'; b.textContent=n; t.appendChild(b); }
  });
}

function renderSummary() {
  const bar  = document.getElementById('summaryBar');
  const prm  = allStocks.filter(s=>s.situation==='prime').length;
  const avg  = allStocks.reduce((a,b)=>a+(b.score||0),0)/Math.max(allStocks.length,1);
  const top  = allStocks.length ? Math.max(...allStocks.map(s=>s.return_3m_pct||0)) : 0;
  bar.innerHTML = `
    <div class="stat"><div class="stat-val v-green">${prm}</div><div class="stat-lbl">🎯 Prime</div></div>
    <div class="stat"><div class="stat-val">${allStocks.length}</div><div class="stat-lbl">Stocks</div></div>
    <div class="stat"><div class="stat-val v-amber">${avg.toFixed(1)}</div><div class="stat-lbl">Avg Score</div></div>
    <div class="stat"><div class="stat-val v-blue">+${top.toFixed(1)}%</div><div class="stat-lbl">Best 3M</div></div>`;
  bar.style.display = 'flex';
}

function renderCards() {
  const content  = document.getElementById('content');
  const filtered = activeFilter==='all' ? allStocks : allStocks.filter(s=>s.situation===activeFilter);

  if (!filtered.length) {
    const msgs = {
      prime: 'No Prime Entry stocks today.<br>Market may be consolidating.<br>Check Watch Closely for setups building.',
      avoid: 'No stocks to avoid today.<br>All remaining stocks have some signal quality.',
    };
    content.innerHTML = `<div class="empty fade"><div class="empty-ico">🔍</div>
      <div class="empty-ttl">Nothing here today</div>
      <div class="empty-dsc">${msgs[activeFilter]||'Nothing in this category today.'}</div></div>`;
    return;
  }

  let html = '';
  if (activeFilter==='all') {
    SIT_ORDER.forEach(sit => {
      const grp = filtered.filter(s=>s.situation===sit);
      if (!grp.length) return;
      const sm = SIT[sit];
      html += `<div class="sh ${sm.cls} fade">
        <span class="sh-icon">${sm.icon}</span>
        <span class="sh-body">${sm.label}<span class="sh-action">${sm.action}</span></span>
        <span class="sh-count">${grp.length}</span></div>`;
      grp.forEach((s,i) => { html += buildCard(s, i*40); });
    });
  } else {
    const sm = SIT[activeFilter];
    if (sm) html += `<div class="sh ${sm.cls} fade" style="margin-top:4px">
      <span class="sh-icon">${sm.icon}</span>
      <span class="sh-body">${sm.label}<span class="sh-action">${sm.action}</span></span>
      <span class="sh-count">${filtered.length}</span></div>`;
    filtered.forEach((s,i) => { html += buildCard(s, i*40); });
  }
  content.innerHTML = html;
  content.querySelectorAll('.card').forEach((el,i) => { el.style.animationDelay=`${i*35}ms`; });
}

// ═══════════════════════════════════════════════════════════
// CARD BUILDER
// ═══════════════════════════════════════════════════════════
function buildCard(s, delay=0) {
  const sit   = s.situation||'watch';
  const sc    = Math.round(s.score||0);
  const e     = s.close||0;
  const sl    = s.sl||e*0.93;
  const t1    = s.target1||e+(e-sl);
  const t2    = s.target2||e+2*(e-sl);
  const r3    = s.return_3m_pct||0;
  const r1    = s.return_1m_pct||0;
  const str   = s.streak||0;
  const ca    = s.cross_age??999;
  const dp    = s.dist_pct||0;
  const wt    = s.weekly_tier||2;
  const deliv = s.delivery_pct||0;

  const prog  = t2>sl ? Math.max(0,Math.min(100,(e-sl)/(t2-sl)*100)) : 50;
  const slp   = e>0 ? ((sl-e)/e*100).toFixed(1) : 0;
  const t1p   = e>0 ? ((t1-e)/e*100).toFixed(1) : 0;
  const t2p   = e>0 ? ((t2-e)/e*100).toFixed(1) : 0;

  const badges = buildBadges(s);
  const pills  = buildPills(s);
  const wlabels = {1:'W✅',2:'W🟡',3:'W❌'};

  // Expanded section varies by situation
  let extraHtml = '';
  if (sit==='prime') {
    extraHtml = `<div class="tv-box">
      <div class="tv-title">📺 TradingView Confirmation Checklist</div>
      <div class="tv-item">REGIME = TREND (not Range or Correction)</div>
      <div class="tv-item">ADX ≥ 20 — trend strength confirmed</div>
      <div class="tv-item">W.Trend = BULL — weekly direction aligned</div>
      <div class="tv-item">HMA Hull V16.1 — all green, no warnings</div>
      <div class="tv-item" style="color:var(--prime);margin-top:6px">✓ All 4 confirmed → Enter at market open</div>
    </div>`;
  } else if (sit==='hold') {
    extraHtml = `<div class="hold-box">
      <div class="hold-title">💰 Hold & Trail Guidance</div>
      <div class="hold-item">In top 25 for ${str} days — sustained momentum</div>
      <div class="hold-item">Trail your SL up to most recent HMA55 level</div>
      <div class="hold-item">If T1 was hit → move SL to your entry price (free trade)</div>
      <div class="hold-item">Don't exit early — let the winner run to T2</div>
    </div>`;
  } else if (sit==='avoid') {
    const reasons = buildAvoidReasons(s);
    extraHtml = `<div class="avoid-box">
      <div class="avoid-title">🚫 Why to Avoid Today</div>
      ${reasons.map(r=>`<div class="avoid-item">${r}</div>`).join('')}
      <div class="avoid-note">Skip this trade. Better setups coming. Capital preservation is key.</div>
    </div>`;
  }

  return `
  <div class="card" data-sit="${sit}" data-sym="${s.symbol}" onclick="toggleCard(this)" style="animation-delay:${delay}ms">
    <div class="card-top">
      <div class="sym-wrap">
        <div class="sym" onclick="openChart(event,'${s.symbol}')">
          ${s.symbol} <span class="sym-icon">📈</span>
        </div>
        <div class="badges">${badges}</div>
      </div>
      <div class="score-ring" data-s="${sc}">
        <div class="sv">${sc}</div><div class="sm">/10</div>
      </div>
    </div>

    <div class="price-row">
      <div class="price"><span class="rs">₹</span>${fmt(e)}</div>
      <span class="ret ${r3>=0?'ret-p':'ret-n'}">${r3>=0?'+':''}${r3.toFixed(1)}% <span class="ret-lbl">3M</span></span>
      <span class="ret ${r1>=0?'ret-p':'ret-n'}" style="font-size:11px">${r1>=0?'+':''}${r1.toFixed(1)}% <span class="ret-lbl">1M</span></span>
    </div>

    <div class="prog-wrap">
      <div class="prog-lbls">
        <span>SL ${fmt(sl)}</span>
        <span style="color:var(--watch)">T1 ${fmt(t1)}</span>
        <span style="color:var(--prime)">T2 ${fmt(t2)}</span>
      </div>
      <div class="prog-track">
        <div class="prog-fill" style="width:100%"></div>
        <div class="prog-dot" style="left:${prog}%"></div>
      </div>
    </div>

    <div class="levels">
      <div class="lrow">
        <span class="llbl">Entry</span><span class="lval">₹${fmt(e)}</span>
        <span class="llbl ml">SL</span><span class="lval lsl">₹${fmt(sl)}</span>
        <span class="lchg">${slp}%</span>
      </div>
      <div class="lrow">
        <span class="llbl">T1</span><span class="lval lt1">₹${fmt(t1)}</span>
        <span class="lchg">+${t1p}%</span>
        <span class="llbl ml">T2</span><span class="lval lt2">₹${fmt(t2)}</span>
        <span class="lchg">+${t2p}%</span>
      </div>
    </div>

    <div class="sigs">${pills}</div>

    <div class="meta">
      <div>📦 <span class="mval">${deliv.toFixed(0)}%</span> delivery</div>
      ${str>=3?`<div>🔥 <span class="mval">${str}d</span> streak</div>`:''}
      <div style="margin-left:auto;font-size:11px;color:var(--muted)">${s.weekly_label||wlabels[wt]||''}</div>
    </div>

    ${extraHtml ? `<div class="extra">${extraHtml}</div>` : ''}
    <div class="expand-hint">${extraHtml ? 'Tap for details ▾' : '▾'}</div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// AVOID REASONS BUILDER
// ═══════════════════════════════════════════════════════════
function buildAvoidReasons(s) {
  const reasons = [];
  const ca  = s.cross_age??999;
  const dp  = s.dist_pct||0;
  const wt  = s.weekly_tier||2;
  const sc  = s.score||0;
  const dd  = s.dist_days||0;
  const obv = s.obv_dir||'flat';
  const del = s.delivery_pct||0;

  if (ca===-1)
    reasons.push('HMA20 is <strong>below</strong> HMA55 — daily trend is bearish');
  else if (ca>30)
    reasons.push(`HMA cross was <strong>${ca} days ago</strong> — move is very mature, late entry`);

  if (s.overextended)
    reasons.push(`Price is <strong>${dp.toFixed(0)}% above HMA55</strong> — severely overextended, high correction risk`);
  else if (dp>15)
    reasons.push(`Price is <strong>${dp.toFixed(0)}% above HMA55</strong> — stretched beyond safe entry zone`);

  if (dd>=4 && obv==='falling')
    reasons.push(`<strong>Distribution volume</strong> — ${dd} of last 5 days had sell-side pressure`);
  else if (obv==='falling')
    reasons.push('OBV trend falling — institutions selling into price');

  if (wt===3)
    reasons.push('Weekly HMA20 is <strong>below</strong> HMA55 — long-term trend is broken');

  if (del<35)
    reasons.push(`Low delivery ${del.toFixed(0)}% — mostly speculative trades, no real buying`);

  if (sc<=3)
    reasons.push(`Score ${sc}/10 — insufficient signal strength for a quality trade`);

  if (reasons.length===0)
    reasons.push('Multiple weak signals across HMA, volume, and risk metrics');

  return reasons;
}

// ═══════════════════════════════════════════════════════════
// BADGE & PILL BUILDERS
// ═══════════════════════════════════════════════════════════
function buildBadges(s) {
  const sit = s.situation||'watch';
  const ca  = s.cross_age??999;
  const wt  = s.weekly_tier||2;
  const str = s.streak||0;
  const lbl = {prime:'Prime ✅',hold:'Hold 💰',watch:'Watch 👀',book:'Book ⚠️',avoid:'Avoid 🚫'};
  let b = `<span class="bdg bdg-${sit}">${lbl[sit]||sit}</span>`;
  if (s.fresh_cross)  b += `<span class="bdg bdg-w1">🟢 Cross ${ca}d</span>`;
  else if (ca<=20)    b += `<span class="bdg bdg-w1">Cross ${ca}d</span>`;
  if (str>=5)         b += `<span class="bdg bdg-str">🔥 ${str}d</span>`;
  b += `<span class="bdg bdg-w${wt}">${{1:'W✅',2:'W🟡',3:'W❌'}[wt]||'W?'}</span>`;
  return b;
}

function buildPills(s) {
  const pills = [];
  const ca  = s.cross_age??999;
  const dp  = s.dist_pct||0;
  const acc = s.acc_days||0;
  const dd  = s.dist_days||0;
  const obv = s.obv_dir||'flat';
  const sb  = s.sector_bias||0;

  if      (ca===-1)       pills.push({l:'HMA ❌ Bearish',c:'bad'});
  else if (s.fresh_cross) pills.push({l:`HMA ✅ ${ca}d`,c:'ok'});
  else if (ca<=20)        pills.push({l:`HMA 🟡 ${ca}d`,c:'mid'});
  else if (ca<999)        pills.push({l:`HMA ${ca}d`,c:''});

  if      (s.overextended)  pills.push({l:`${dp.toFixed(0)}% ⚠️ stretched`,c:'bad'});
  else if (dp<=5&&dp>0)     pills.push({l:`${dp.toFixed(1)}% ✅ room`,c:'ok'});
  else if (dp>0)            pills.push({l:`${dp.toFixed(1)}% above`,c:''});

  if      (acc>=4&&obv==='rising') pills.push({l:'Accum vol ✅',c:'ok'});
  else if (dd>=4||obv==='falling') pills.push({l:'Dist vol ❌',c:'bad'});
  else                             pills.push({l:'Vol neutral',c:''});

  if      (sb===1)  pills.push({l:'Sector ✅',c:'ok'});
  else if (sb===-1) pills.push({l:'Sector ❌',c:'bad'});

  return pills.map(p=>`<span class="pill ${p.c}">${p.l}</span>`).join('');
}

// ═══════════════════════════════════════════════════════════
// CHART
// ═══════════════════════════════════════════════════════════
function openChart(e, sym) {
  e.stopPropagation();
  chartSym   = sym;
  chartRange = '3M';
  document.getElementById('chartSym').textContent = sym + ' — NSE';
  document.getElementById('tvLink').href =
    `https://www.tradingview.com/chart/?symbol=NSE%3A${sym}`;
  renderChart();
  document.getElementById('chartPanel').classList.add('open');
  if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
}

function closeChart() {
  document.getElementById('chartPanel').classList.remove('open');
  document.getElementById('chartBody').innerHTML = '';
  chartSym = null;
}

function setChartRange(range, btn) {
  chartRange = range;
  document.querySelectorAll('.chart-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderChart();
}

function renderChart() {
  if (!chartSym) return;
  const rangeMap = {'1M':'1M','3M':'3M','6M':'6M','1Y':'12M'};
  const r = rangeMap[chartRange]||'3M';
  const h = document.getElementById('chartBody');
  const url = `https://s.tradingview.com/widgetembed/?frameElementId=tv_chart&symbol=NSE%3A${chartSym}&interval=D&hidesidetoolbar=1&hidetoptoolbar=0&symboledit=0&saveimage=0&toolbarbg=0a0f1e&studies=MAExp%401&theme=dark&style=1&timezone=Asia%2FKolkata&withdateranges=1&daterange=${r}&hide_side_toolbar=1&allow_symbol_change=0&referral_id=nse_scanner`;
  h.innerHTML = `<iframe src="${url}" width="100%" height="100%" frameborder="0" allowtransparency="true" scrolling="no"></iframe>`;
}

// ═══════════════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════════════
function toggleCard(el) {
  const sym = el.dataset.sym;
  if (expandedSym && expandedSym!==sym) {
    document.querySelector(`.card[data-sym="${expandedSym}"]`)?.classList.remove('open');
  }
  el.classList.toggle('open');
  expandedSym = el.classList.contains('open') ? sym : null;
  const hint = el.querySelector('.expand-hint');
  if (hint) hint.textContent = el.classList.contains('open') ? 'Tap to close ▴' : 'Tap for details ▾';
  if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

function setFilter(sit) {
  activeFilter = sit;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.sit===sit));
  document.getElementById('tabsRow').style.display = '';
  document.getElementById('summaryBar').style.display = 'flex';
  renderCards();
  window.scrollTo({top:0,behavior:'smooth'});
}

function switchView(view) {
  activeView = view;
  ['Scan','Prime','List','Guide'].forEach(v=>{
    document.getElementById('nb'+v)?.classList.toggle('on', v.toLowerCase()===view);
  });
  document.getElementById('tabsRow').style.display    = ['scan','prime'].includes(view) ? '' : 'none';
  document.getElementById('summaryBar').style.display = view==='scan' ? 'flex' : 'none';

  if      (view==='scan')  { setFilter('all'); }
  else if (view==='prime') { setFilter('prime'); }
  else if (view==='list')  { renderList(); }
  else if (view==='guide') { renderGuide(); }
}

function renderList() {
  const content = document.getElementById('content');
  const sorted  = [...allStocks].sort((a,b)=>(b.score||0)-(a.score||0));
  let html = `<div style="margin-bottom:8px;font-size:12px;color:var(--muted);padding-top:4px;font-family:var(--sans)">${sorted.length} stocks · sorted by forward score</div>`;
  sorted.forEach((s,i) => {
    const sit  = s.situation||'watch';
    const sm   = SIT[sit];
    const rCls = (s.return_3m_pct||0)>=0?'ret-p':'ret-n';
    const slp  = s.close>0 ? ((s.sl-s.close)/s.close*100).toFixed(1) : 0;
    const t2p  = s.close>0 ? ((s.target2-s.close)/s.close*100).toFixed(1) : 0;
    html += `<div class="card" data-sit="${sit}" data-sym="${s.symbol}" onclick="toggleCard(this)" style="animation-delay:${i*25}ms">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="font-family:var(--mono);font-size:12px;color:var(--muted);min-width:22px">${i+1}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:7px">
            <span class="sym" style="font-size:15px" onclick="openChart(event,'${s.symbol}')">${s.symbol} <span class="sym-icon">📈</span></span>
            <span class="bdg bdg-${sit}" style="font-size:10px">${sm?.icon} ${sit}</span>
          </div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px;font-family:var(--sans)">
            ₹${fmt(s.close)} · SL ${slp}% · T2 +${t2p}%
          </div>
        </div>
        <div style="text-align:right">
          <div class="ret ${rCls}" style="font-size:11px">${(s.return_3m_pct||0)>=0?'+':''}${(s.return_3m_pct||0).toFixed(1)}%</div>
          <div style="font-family:var(--mono);font-size:14px;font-weight:700;margin-top:3px">${Math.round(s.score||0)}/10</div>
        </div>
      </div>
    </div>`;
  });
  content.innerHTML = html;
  content.querySelectorAll('.card').forEach((el,i)=>{ el.style.animationDelay=`${i*22}ms`; });
}

function fmt(n) {
  const v = parseFloat(n)||0;
  return v>=1000 ? v.toLocaleString('en-IN',{maximumFractionDigits:0}) : v.toFixed(v>=100?0:2);
}
