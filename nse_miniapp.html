<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#07101f">
<title>NSE Scanner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap');

:root {
  --bg:      #07101f;
  --bg2:     #0d1a2e;
  --bg3:     #132338;
  --bg4:     #1a2d46;
  --border:  rgba(255,255,255,0.07);
  --text:    #dde6f4;
  --muted:   #5d718f;
  --accent:  #3b82f6;
  --prime:   #0fd49c;
  --hold:    #f59e0b;
  --watch:   #60a5fa;
  --book:    #fb923c;
  --avoid:   #f87171;
  --up:      #0fd49c;
  --dn:      #f87171;
  --sans: 'Outfit', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;min-height:100dvh;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit;-webkit-tap-highlight-color:transparent}

/* ── Header ── */
.hdr{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 14px 0}
.hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-size:14px;font-weight:800;letter-spacing:0.06em;color:var(--accent);font-family:var(--sans)}
.dt{font-size:11px;color:var(--muted);font-family:var(--mono)}
.rbtn{width:30px;height:30px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;transition:transform 0.3s}
.rbtn.spin{animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Status Bar ── */
.sbar{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px;padding:8px 14px;background:var(--bg);border-bottom:1px solid var(--border)}
.st{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:7px 8px}
.st-lbl{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:4px;font-family:var(--sans)}
.st-row{display:flex;align-items:center;gap:3px;margin-bottom:2px;font-size:10px;font-weight:600;font-family:var(--sans)}
.st-n{font-family:var(--mono);font-size:11px;font-weight:700;margin-left:auto}
.sec-chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px}
.sec-chip{font-size:9px;font-weight:600;padding:2px 5px;border-radius:5px;background:rgba(15,212,156,0.1);border:1px solid rgba(15,212,156,0.2);color:var(--prime)}
.bias-val{font-size:11px;font-weight:700;font-family:var(--mono);margin-bottom:3px}
.bias-track{height:5px;border-radius:3px;background:linear-gradient(90deg,#f87171 0%,#fbbf24 50%,#0fd49c 100%);position:relative;margin-bottom:3px}
.bias-pin{position:absolute;top:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid var(--bg3);box-shadow:0 0 4px rgba(255,255,255,0.4)}
.bias-lbls{display:flex;justify-content:space-between;font-size:8px;font-weight:600}

/* ── Tabs ── */
.tabs{display:flex;gap:5px;overflow-x:auto;padding:8px 14px 7px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:5px 11px;border-radius:18px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--bg2);color:var(--muted);white-space:nowrap;transition:all 0.15s;font-family:var(--sans)}
.tab.on{color:#fff;border-color:transparent}
.tab[data-sit="all"].on  {background:var(--bg3);color:var(--text)}
.tab[data-sit="prime"].on{background:rgba(15,212,156,0.12);border-color:rgba(15,212,156,0.3);color:var(--prime)}
.tab[data-sit="hold"].on {background:rgba(245,158,11,0.12);border-color:rgba(245,158,11,0.3);color:var(--hold)}
.tab[data-sit="watch"].on{background:rgba(96,165,250,0.12);border-color:rgba(96,165,250,0.3);color:var(--watch)}
.tab[data-sit="book"].on {background:rgba(251,146,60,0.12);border-color:rgba(251,146,60,0.3);color:var(--book)}
.tab[data-sit="avoid"].on{background:rgba(248,113,113,0.12);border-color:rgba(248,113,113,0.3);color:var(--avoid)}
.cnt{background:rgba(255,255,255,0.14);border-radius:8px;padding:0 5px;font-size:10px;margin-left:3px;font-weight:700}

/* ── Content ── */
.content{flex:1;padding:8px 12px 88px}

/* ── Section headers ── */
.sh{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;margin:10px 0 7px;font-size:13px;font-weight:700;font-family:var(--sans)}
.sh-body{flex:1}
.sh-sub{display:block;font-size:11px;font-weight:400;opacity:0.72;margin-top:1px}
.sh-n{font-family:var(--mono);font-size:11px;opacity:0.6}
.sh-prime{background:rgba(15,212,156,0.08);border:1px solid rgba(15,212,156,0.22);color:var(--prime)}
.sh-hold {background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.22);color:var(--hold)}
.sh-watch{background:rgba(96,165,250,0.08);border:1px solid rgba(96,165,250,0.22);color:var(--watch)}
.sh-book {background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.22);color:var(--book)}
.sh-avoid{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.22);color:var(--avoid)}

/* ── Cards ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:13px 13px 13px 17px;margin-bottom:9px;cursor:pointer;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;transition:border-color 0.15s}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:2px 0 0 2px}
.card[data-sit="prime"]::before{background:var(--prime)}
.card[data-sit="hold"]::before {background:var(--hold)}
.card[data-sit="watch"]::before{background:var(--watch)}
.card[data-sit="book"]::before {background:var(--book)}
.card[data-sit="avoid"]::before{background:var(--avoid)}
.card.open{border-color:rgba(255,255,255,0.12)}
.card:active{opacity:0.88;transform:scale(0.99)}

/* Card top */
.ctop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.sym{font-size:17px;font-weight:800;letter-spacing:0.02em;display:inline-flex;align-items:center;gap:5px}
.sym-ico{font-size:12px;opacity:0.4;transition:opacity 0.15s}
.card.open .sym-ico{opacity:0.7}
.sring{width:46px;height:46px;border-radius:50%;border:2.5px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.sv{font-family:var(--mono);font-size:14px;font-weight:700;line-height:1}
.sm{font-size:8px;color:var(--muted)}

/* Tags */
.tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;border:1px solid;font-family:var(--sans)}
.t-prime{color:var(--prime);border-color:rgba(15,212,156,0.3);background:rgba(15,212,156,0.09)}
.t-hold {color:var(--hold); border-color:rgba(245,158,11,0.3);background:rgba(245,158,11,0.09)}
.t-watch{color:var(--watch);border-color:rgba(96,165,250,0.3);background:rgba(96,165,250,0.09)}
.t-book {color:var(--book); border-color:rgba(251,146,60,0.3);background:rgba(251,146,60,0.09)}
.t-avoid{color:var(--avoid);border-color:rgba(248,113,113,0.3);background:rgba(248,113,113,0.09)}
/* Matrix tags */
.t-hc   {color:#0fd49c;border-color:rgba(15,212,156,0.25);background:rgba(15,212,156,0.07)}
.t-inst {color:#6ee7b7;border-color:rgba(110,231,183,0.25);background:rgba(110,231,183,0.07)}
.t-solid{color:#a3e635;border-color:rgba(163,230,53,0.25);background:rgba(163,230,53,0.07)}
.t-bal  {color:#94a3b8;border-color:rgba(148,163,184,0.25);background:rgba(148,163,184,0.07)}
.t-hype {color:#fb923c;border-color:rgba(251,146,60,0.25);background:rgba(251,146,60,0.07)}
.t-rebound{color:#fbbf24;border-color:rgba(251,191,36,0.25);background:rgba(251,191,36,0.07)}
.t-fade {color:#f87171;border-color:rgba(248,113,113,0.25);background:rgba(248,113,113,0.07)}
.t-retail{color:#f87171;border-color:rgba(248,113,113,0.2);background:rgba(248,113,113,0.06)}

.mdesc{font-size:11px;color:var(--muted);font-style:italic;margin-bottom:8px;font-family:var(--sans)}

/* Frozen badge */
.frozen{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;background:rgba(15,212,156,0.08);border:1px solid rgba(15,212,156,0.22);color:var(--prime);border-radius:7px;padding:3px 9px;margin-bottom:7px;font-family:var(--sans)}

/* Price row */
.prow{display:flex;align-items:baseline;gap:7px;flex-wrap:wrap;margin-bottom:8px}
.price{font-family:var(--mono);font-size:20px;font-weight:700}
.rs{font-size:12px;color:var(--muted)}
.ret{font-size:11px;font-weight:700;padding:2px 7px;border-radius:7px;font-family:var(--sans)}
.rp{color:var(--up);background:rgba(15,212,156,0.1)}
.rn{color:var(--dn);background:rgba(248,113,113,0.1)}
.rl{font-size:9px;opacity:0.7}

/* Progress bar */
.pb-wrap{margin-bottom:8px}
.pb-lbls{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:3px;font-family:var(--sans)}
.pb-track{height:5px;border-radius:3px;background:var(--bg4);position:relative;overflow:hidden}
.pb-fill{height:100%;background:linear-gradient(90deg,#f87171 0%,#fbbf24 48%,#0fd49c 100%)}
.pb-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid var(--bg2);box-shadow:0 0 4px rgba(255,255,255,0.4)}

/* Levels */
.lvls{background:var(--bg3);border-radius:8px;padding:9px 11px;margin-bottom:8px}
.lr{display:flex;font-size:11px;margin-bottom:5px;align-items:center;font-family:var(--sans)}
.lr:last-child{margin-bottom:0}
.ll{color:var(--muted);font-size:10px;min-width:32px}
.lv{font-family:var(--mono);font-size:12px;font-weight:600}
.lsl{color:var(--avoid)} .lt1{color:var(--watch)} .lt2{color:var(--prime)}
.lc{font-size:10px;color:var(--muted);margin-left:3px}
.mla{margin-left:auto}

/* Signal pills */
.pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-family:var(--sans)}
.pk{color:var(--prime);border-color:rgba(15,212,156,0.25);background:rgba(15,212,156,0.08)}
.pm{color:var(--hold);border-color:rgba(245,158,11,0.25);background:rgba(245,158,11,0.08)}
.pb2{color:var(--avoid);border-color:rgba(248,113,113,0.25);background:rgba(248,113,113,0.08)}

/* Meta */
.meta{display:flex;gap:10px;font-size:11px;color:var(--muted);flex-wrap:wrap;font-family:var(--sans)}
.mv{color:var(--text);font-weight:600}

/* ── Expand hint ── */
.hint{text-align:center;font-size:11px;color:var(--muted);padding:8px 0 2px;font-family:var(--sans);transition:color 0.15s}
.card.open .hint{color:var(--accent)}

/* ── Expandable section — HIDDEN BY DEFAULT ── */
.extra{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);animation:fadeUp 0.2s ease}
.card.open .extra{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Info boxes inside extra */
.ibox{border-radius:9px;padding:10px 12px}
.ib-prime{background:rgba(15,212,156,0.05);border:1px solid rgba(15,212,156,0.2)}
.ib-hold {background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.2)}
.ib-watch{background:rgba(96,165,250,0.05);border:1px solid rgba(96,165,250,0.2)}
.ib-avoid{background:rgba(248,113,113,0.05);border:1px solid rgba(248,113,113,0.2)}
.ibox-title{font-size:11px;font-weight:700;margin-bottom:7px;font-family:var(--sans)}
.ibox-item{font-size:11px;color:var(--muted);display:flex;gap:5px;margin-bottom:4px;line-height:1.45;font-family:var(--sans)}
.ibox-item.ok  {color:var(--prime)}
.ibox-item.warn{color:var(--hold)}
.ibox-item.bad {color:var(--avoid)}
.ibox-note{font-size:10px;margin-top:7px;padding-top:7px;border-top:1px solid var(--border);opacity:0.7;font-family:var(--sans)}

/* ── News items ── */
.news-item{background:var(--bg3);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--border)}
.news-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;margin-bottom:6px;display:inline-block}
.news-title{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:4px}
.news-meta{font-size:10px;color:var(--muted);display:flex;justify-content:space-between}

/* ── Compact card (Watch compact) ── */
.ccard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px 10px 16px;margin-bottom:7px;position:relative;overflow:hidden;display:flex;align-items:center;gap:10px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.ccard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.cc-w::before{background:var(--watch)}
.cc-b::before{background:var(--book)}
.cc-sym{font-size:14px;font-weight:800;font-family:var(--sans)}
.cc-sub{font-size:10px;color:var(--muted);margin-top:2px;font-family:var(--sans)}
.cc-sc{font-family:var(--mono);font-size:13px;font-weight:700}
.more{text-align:center;font-size:11px;color:var(--muted);padding:3px 0 8px;font-family:var(--sans)}

/* ── Chart panel ── */
.cpanel{display:none;position:fixed;left:0;right:0;bottom:0;top:0;background:var(--bg);z-index:500;flex-direction:column}
.cpanel.open{display:flex}
.cp-hdr{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border);gap:10px;flex-shrink:0}
.cp-sym{font-size:18px;font-weight:800;flex:1;font-family:var(--sans)}
.cp-close{width:34px;height:34px;border-radius:9px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid var(--border)}
.cp-tabs{display:flex;gap:6px;padding:9px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.cp-tab{padding:5px 13px;border-radius:15px;font-size:12px;font-weight:600;background:var(--bg2);border:1px solid var(--border);color:var(--muted);font-family:var(--sans)}
.cp-tab.on{background:var(--accent);border-color:var(--accent);color:#fff}
.cp-body{flex:1;overflow:hidden}
.cp-body iframe{width:100%;height:100%;border:none}
.cp-note{padding:7px 16px;font-size:11px;color:var(--muted);text-align:center;border-top:1px solid var(--border);flex-shrink:0;font-family:var(--sans)}
.tv-open{padding:6px 12px;background:var(--accent);color:#fff;border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;font-family:var(--sans)}

/* ── Bottom nav ── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);display:flex;padding:7px 10px;padding-bottom:max(7px,env(safe-area-inset-bottom));gap:2px;z-index:200}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px;border-radius:9px;font-size:11px;color:var(--muted);font-weight:600;transition:all 0.15s;font-family:var(--sans)}
.nb .ni{font-size:21px;line-height:1}
.nb.on{background:var(--bg3);color:var(--accent)}

/* ── Misc ── */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px;color:var(--muted);font-family:var(--sans)}
.lring{width:38px;height:38px;border-radius:50%;border:3px solid var(--bg3);border-top-color:var(--accent);animation:spin 0.8s linear infinite}
.empty{text-align:center;padding:50px 24px;color:var(--muted);font-family:var(--sans)}
.empty-ico{font-size:44px;margin-bottom:14px}
.empty-ttl{font-size:17px;font-weight:700;color:var(--text);margin-bottom:8px}
.empty-dsc{font-size:13px;line-height:1.65}
.fade{animation:fadeUp 0.2s ease}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="hrow">
    <div class="logo">NSE SCANNER</div>
    <div class="dt" id="scanDate">—</div>
    <button class="rbtn" id="rbtn" onclick="reload()">↻</button>
  </div>

  <!-- Status Bar -->
  <div class="sbar" id="sbar" style="display:none">
    <!-- Tile 1: Delivery Quality -->
    <div class="st">
      <div class="st-lbl">Delivery</div>
      <div class="st-row"><span>🏦</span><span style="color:#6ee7b7">High</span><span class="st-n" id="s-dhigh" style="color:#6ee7b7">—</span></div>
      <div class="st-row"><span>⚖️</span><span style="color:#fbbf24">Bal</span><span class="st-n" id="s-dbal" style="color:#fbbf24">—</span></div>
      <div class="st-row"><span>🛒</span><span style="color:#f87171">Retail</span><span class="st-n" id="s-dret" style="color:#f87171">—</span></div>
    </div>
    <!-- Tile 2: Signal Strength -->
    <div class="st">
      <div class="st-lbl">Signals</div>
      <div class="st-row"><span>🟢</span><span style="color:#0fd49c">Strong</span><span class="st-n" id="s-sstr" style="color:#0fd49c">—</span></div>
      <div class="st-row"><span>🟡</span><span style="color:#fbbf24">Mod</span><span class="st-n" id="s-smod" style="color:#fbbf24">—</span></div>
      <div class="st-row"><span>🔴</span><span style="color:#f87171">Weak</span><span class="st-n" id="s-swk" style="color:#f87171">—</span></div>
    </div>
    <!-- Tile 3: Top Sectors -->
    <div class="st">
      <div class="st-lbl">Sectors</div>
      <div class="sec-chips" id="s-sectors"></div>
    </div>
    <!-- Tile 4: Market Bias -->
    <div class="st">
      <div class="st-lbl">Mkt Bias</div>
      <div class="bias-val" id="s-biasval" style="color:#fbbf24">—</div>
      <div class="bias-track"><div class="bias-pin" id="s-biaspin" style="left:50%"></div></div>
      <div class="bias-lbls">
        <span style="color:#f87171">Bear</span>
        <span style="color:#fbbf24">Neu</span>
        <span style="color:#0fd49c">Bull</span>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="tabsRow">
    <button class="tab on" data-sit="all"   onclick="setFilter('all')">All</button>
    <button class="tab"    data-sit="prime"  onclick="setFilter('prime')">🎯 Prime</button>
    <button class="tab"    data-sit="hold"   onclick="setFilter('hold')">💰 Hold</button>
    <button class="tab"    data-sit="watch"  onclick="setFilter('watch')">👀 Watch</button>
    <button class="tab"    data-sit="book"   onclick="setFilter('book')">⚠️ Book</button>
    <button class="tab"    data-sit="avoid"  onclick="setFilter('avoid')">🚫 Avoid</button>
  </div>
</div>

<!-- Content -->
<div class="content" id="content">
  <div class="loader"><div class="lring"></div><div>Loading scan data…</div></div>
</div>

<!-- Chart Panel -->
<div class="cpanel" id="cpanel">
  <div class="cp-hdr">
    <div class="cp-sym" id="cpSym">—</div>
    <a class="tv-open" id="cpTvLink" href="#" target="_blank">Open TV ↗</a>
    <button class="cp-close" onclick="closeChart()">✕</button>
  </div>
  <div class="cp-tabs">
    <button class="cp-tab on" onclick="setRange('1M',this)">1M</button>
    <button class="cp-tab"    onclick="setRange('3M',this)">3M</button>
    <button class="cp-tab"    onclick="setRange('6M',this)">6M</button>
    <button class="cp-tab"    onclick="setRange('1Y',this)">1Y</button>
  </div>
  <div class="cp-body" id="cpBody"></div>
  <div class="cp-note">TradingView chart · Tap "Open TV ↗" for HMA indicators</div>
</div>

<!-- Bottom Nav -->
<div class="bnav">
  <button class="nb on" id="nbScan"  onclick="switchView('scan')"><span class="ni">📊</span>Scan</button>
  <button class="nb"    id="nbPrime" onclick="switchView('prime')"><span class="ni">🎯</span>Prime</button>
  <button class="nb"    id="nbList"  onclick="switchView('list')"><span class="ni">☰</span>List</button>
  <button class="nb"    id="nbNews"  onclick="switchView('news')"><span class="ni">📰</span>News</button>

<script>
// ── Config ────────────────────────────────────────────────
const DATA_URL  = 'https://raw.githubusercontent.com/JayeshSRathod/nse-scanner/main/telegram_last_scan.json';
const NEWS_URL  = 'https://raw.githubusercontent.com/JayeshSRathod/nse-scanner/main/output/news_latest.json';
const CACHE_KEY = 'nse_v4';
const tg = window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();tg.setHeaderColor('#07101f');tg.setBackgroundColor('#07101f')}

// ── State ──────────────────────────────────────────────────
let stocks=[], scanDate='', filter='all', view='scan', expanded=null, chartSym=null, chartRange='3M', newsData={};

// ── Situation config ──────────────────────────────────────
const SIT={
  prime:{icon:'🎯',label:'Prime Entry',   action:'Enter today — confirm on TradingView', cls:'sh-prime'},
  hold: {icon:'💰',label:'Hold & Trail',  action:'Already in move — trail your stop loss up', cls:'sh-hold'},
  watch:{icon:'👀',label:'Watch Closely', action:'Good setup — one signal missing. Check tomorrow.', cls:'sh-watch'},
  book: {icon:'⚠️',label:'Book Profits', action:'Move maturing — consider booking 50-100%', cls:'sh-book'},
  avoid:{icon:'🚫',label:'Avoid Now',     action:'Weak signal or bearish — skip today', cls:'sh-avoid'},
};
const SORD=['prime','hold','watch','book','avoid'];

// ── Matrix label calculation ──────────────────────────────
function getMatrixLabel(s){
  const sc=s.score||0, del=s.delivery_pct||0, ca=s.cross_age??999;
  const overext=s.overextended||false, acc=s.acc_days||0, obv=s.obv_dir||'flat';

  // Delivery column
  let delCol = del>=50?'inst': del>=30?'bal':'retail';

  // Trend row
  let trendRow;
  if(sc>=7 && ca<=20 && !overext) trendRow='strong';
  else if(sc>=5 && ca<=30)        trendRow='reversal';
  else if(overext || sc<=4)       trendRow='exhaust';
  else                            trendRow='flat';

  const matrix={
    strong:  {inst:{t:'t-hc',   l:'🏆 High Conviction'}, bal:{t:'t-solid', l:'⚡ Solid Momentum'}, retail:{t:'t-hype',   l:'⚠️ Retail Hype'}},
    reversal:{inst:{t:'t-rebound',l:'🔄 Potential Rebound'},bal:{t:'t-bal',  l:'👁 Watch & Wait'},  retail:{t:'t-hype',   l:'🎲 Retail Bounce'}},
    exhaust: {inst:{t:'t-fade', l:'📉 Fading Move'},      bal:{t:'t-fade',  l:'💨 Losing Steam'},   retail:{t:'t-fade',   l:'🔴 Retail Exhaustion'}},
    flat:    {inst:{t:'t-bal',  l:'🔍 Accumulation?'},    bal:{t:'t-bal',   l:'↔ Sideways Mode'},   retail:{t:'t-retail', l:'😴 Low Interest'}},
  };
  const delTag={inst:{t:'t-inst',l:'🏦 Institutional Backed'},bal:{t:'t-bal',l:'⚖️ Balanced'},retail:{t:'t-retail',l:'📉 Retail Driven'}};
  const trendDesc={strong:'Strong Trend',reversal:'Short-term Reversal',exhaust:'Exhaustion',flat:'Flat / Weak'};
  const delDesc={inst:'>50% delivery',bal:'30-50% delivery',retail:'<30% delivery'};

  const mx  = matrix[trendRow][delCol];
  const dt  = delTag[delCol];
  const desc= trendDesc[trendRow]+' · '+delDesc[delCol];
  return {mx, dt, desc};
}

// ── DATA ──────────────────────────────────────────────────
async function loadData(force=false){
  const btn=document.getElementById('rbtn'); btn.classList.add('spin');
  try{
    if(!force){const c=sessionStorage.getItem(CACHE_KEY); if(c){const p=JSON.parse(c); if(p.stocks?.length){renderAll(p);btn.classList.remove('spin');return;}}}
    const r=await fetch(DATA_URL+'?t='+Date.now()); if(!r.ok)throw new Error();
    
    // Fetch News Data (v7)
    try {
      const nr = await fetch(NEWS_URL+'?t='+Date.now());
      if(nr.ok) newsData = await nr.json();
    } catch(e) { console.warn("News fetch failed", e); }

    const d=await r.json(); sessionStorage.setItem(CACHE_KEY,JSON.stringify(d)); renderAll(d);
  }catch(e){const c=sessionStorage.getItem(CACHE_KEY); if(c)renderAll(JSON.parse(c)); else renderSample();}
  finally{btn.classList.remove('spin');}
}
function reload(){sessionStorage.removeItem(CACHE_KEY);loadData(true);}

// ── RENDER ALL ────────────────────────────────────────────
function renderAll(data){
  stocks=data.stocks||[]; scanDate=data.scan_date||'';
  try{const d=new Date(scanDate+'T00:00:00'); document.getElementById('scanDate').textContent=d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}catch(e){}
  updateBadges(); renderStatusBar(); renderCards();
}

  if(!stocks.length) return;
  // Delivery quality
  let dh=0,db=0,dr=0;
  stocks.forEach(s=>{ const d=s.delivery_pct||0; if(d>=50)dh++; else if(d>=30)db++; else dr++; });
  document.getElementById('s-dhigh').textContent=dh;
  document.getElementById('s-dbal').textContent=db;
  document.getElementById('s-dret').textContent=dr;

  // Signal strength
  let ss=0,sm=0,sw=0;
  stocks.forEach(s=>{ const sc=s.score||0; if(sc>=7)ss++; else if(sc>=4)sm++; else sw++; });
  document.getElementById('s-sstr').textContent=ss;
  document.getElementById('s-smod').textContent=sm;
  document.getElementById('s-swk').textContent=sw;

  // Top sectors — comprehensive NSE symbol mapping
  const SECTOR_MAP={
    // Pharma & Healthcare
    'SUNPHARMA':'Pharma','CIPLA':'Pharma','DRREDDY':'Pharma','DIVISLAB':'Pharma',
    'BIOCON':'Pharma','ALKEM':'Pharma','LUPIN':'Pharma','AUROPHARMA':'Pharma',
    'TORNTPHARM':'Pharma','IPCALAB':'Pharma','ABBOTINDIA':'Pharma','PFIZER':'Pharma',
    'GLAXO':'Pharma','GLENMARK':'Pharma','GRANULES':'Pharma','NATCOPHARM':'Pharma',
    'AJANTPHARM':'Pharma','JBCHEPHARM':'Pharma','SUVEN':'Pharma','LALPATHLAB':'Pharma',
    'METROPOLIS':'Pharma','ASTER':'Pharma','ASTERDM':'Pharma','FORTIS':'Pharma',
    'APOLLOHOSP':'Pharma','MAXHEALTH':'Pharma','EMCURE':'Pharma',
    // IT & Tech
    'TCS':'IT','INFY':'IT','WIPRO':'IT','HCLTECH':'IT','TECHM':'IT',
    'LTIM':'IT','MPHASIS':'IT','COFORGE':'IT','PERSISTENT':'IT','OFSS':'IT',
    'KPIT':'IT','TATAELXSI':'IT','LTTS':'IT','CYIENT':'IT','MASTEK':'IT',
    'BIRLASOFT':'IT','ZENSAR':'IT','NIIT':'IT','RATEGAIN':'IT','NEWGEN':'IT',
    'DIXON':'Electronics','KAYNES':'Electronics','SYRMA':'Electronics',
    'AVALON':'Electronics','AMBER':'Electronics','VDLSEC':'Electronics',
    // Banks & Finance
    'HDFCBANK':'Banks','ICICIBANK':'Banks','SBIN':'Banks','AXISBANK':'Banks',
    'KOTAKBANK':'Banks','INDUSINDBK':'Banks','BANDHANBNK':'Banks','FEDERALBNK':'Banks',
    'IDFCFIRSTB':'Banks','RBLBANK':'Banks','PNB':'Banks','BANKBARODA':'Banks',
    'CANARABANK':'Banks','UNIONBANK':'Banks','INDIANB':'Banks',
    'BAJFINANCE':'NBFC','BAJAJFINSV':'NBFC','CHOLAFIN':'NBFC','MUTHOOTFIN':'NBFC',
    'MANAPPURAM':'NBFC','M&MFIN':'NBFC','ABCAPITAL':'NBFC','SHRIRAMFIN':'NBFC',
    'HDFCAMC':'AMC','NIPPONLIFE':'AMC','MFSL':'Insurance','SBILIFE':'Insurance',
    'HDFCLIFE':'Insurance','ICICIPRULI':'Insurance','LICI':'Insurance',
    // FMCG & Consumer
    'HINDUNILVR':'FMCG','ITC':'FMCG','NESTLEIND':'FMCG','BRITANNIA':'FMCG',
    'DABUR':'FMCG','MARICO':'FMCG','GODREJCP':'FMCG','COLPAL':'FMCG',
    'PGHH':'FMCG','EMAMILTD':'FMCG','VBL':'FMCG','TATACONSUM':'FMCG',
    'VARUNBEV':'FMCG','RADICO':'FMCG','UBL':'FMCG','MCDOWELL-N':'FMCG',
    'HONASA':'FMCG','NYKAA':'FMCG','BIKAJI':'FMCG','PATANJALI':'FMCG',
    // Auto & Auto Ancillary
    'MARUTI':'Auto','TATAMOTORS':'Auto','M&M':'Auto','BAJAJ-AUTO':'Auto',
    'HEROMOTOCO':'Auto','EICHERMOT':'Auto','TVSMOTOR':'Auto','ASHOKLEY':'Auto',
    'BHARATFORG':'Auto','MOTHERSON':'Auto','BOSCHLTD':'Auto','MRF':'Auto',
    'APOLLOTYRE':'Auto','CEATLTD':'Auto','BALKRISIND':'Auto','EXIDEIND':'Auto',
    'AMARAJABAT':'Auto','SUPRAJIT':'Auto','ENDURANCE':'Auto','SUNDRMFAST':'Auto',
    // Power & Energy
    'NTPC':'Power','POWERGRID':'Power','TATAPOWER':'Power','ADANIPOWER':'Power',
    'ADANIGRENT':'Power','CESC':'Power','TORNTPOWER':'Power','JSPL':'Power',
    'NHPC':'Power','SJVN':'Power','IREDA':'Power','RPOWER':'Power',
    'RELIANCE':'Energy','ONGC':'Energy','IOC':'Energy','BPCL':'Energy',
    'HINDPETRO':'Energy','GAIL':'Energy','PETRONET':'Energy','IGL':'Energy',
    'MGL':'Energy','GUJGASLTD':'Energy','ATGL':'Energy',
    // Metals & Mining
    'TATASTEEL':'Metals','JSWSTEEL':'Metals','SAIL':'Metals','HINDALCO':'Metals',
    'VEDL':'Metals','NATIONALUM':'Metals','NMDC':'Metals','COALINDIA':'Metals',
    'HINDCOPPER':'Metals','APLAPOLLO':'Metals','JINDALSAW':'Metals',
    // Capital Goods & Industrial
    'LT':'CapGoods','SIEMENS':'CapGoods','ABB':'CapGoods','HAVELLS':'CapGoods',
    'CROMPTON':'CapGoods','VOLTAS':'CapGoods','WHIRLPOOL':'CapGoods',
    'BHEL':'CapGoods','THERMAX':'CapGoods','CUMMINSIND':'CapGoods',
    'KEC':'CapGoods','KALPATPOWR':'CapGoods','SUZLON':'CapGoods',
    'INOXWIND':'CapGoods','TRITURBINE':'CapGoods',
    // Defence
    'HAL':'Defence','BEL':'Defence','MIDHANI':'Defence','BEML':'Defence',
    'COCHINSHIP':'Defence','MAZDOCK':'Defence','GRSE':'Defence',
    // Realty
    'DLF':'Realty','GODREJPROP':'Realty','OBEROIRLTY':'Realty','BRIGADE':'Realty',
    'PRESTIGE':'Realty','PHOENIXLTD':'Realty','SOBHA':'Realty','LODHA':'Realty',
    // Chemicals & Specialty
    'PIDILITIND':'Chemicals','ASIANPAINT':'Chemicals','BERGERPAINTS':'Chemicals',
    'KANSAINER':'Chemicals','VINATIORGA':'Chemicals','DEEPAKNTR':'Chemicals',
    'AARTI IND':'Chemicals','CLEAN SCI':'Chemicals','NAVINFLUOR':'Chemicals',
    // Telecom & Media
    'BHARTIARTL':'Telecom','INDUSTOWER':'Telecom','TATACOMM':'Telecom',
    'ZEEL':'Media','SUNTV':'Media','PVRINOX':'Media',

    'DMART':'Retail','TRENT':'Retail','ABFRL':'Retail','SHOPERSTOP':'Retail',
    'WESTLIFE':'QSR','JUBLFOOD':'QSR','DEVYANI':'QSR','SAPPHIRE':'QSR',

    'ULTRACEMCO':'Cement','SHREECEM':'Cement','AMBUJACEM':'Cement',
    'ACC':'Cement','DALMIA':'Cement','JKCEMENT':'Cement',

    'COROMANDEL':'Agri','PIIND':'Agri','CHAMBAL':'Agri','GNFC':'Agri',
    'RALLIS':'Agri','BAYER':'Agri',
  };

  const secCount={};
  stocks.forEach(s=>{
    const sym=(s.symbol||'').toUpperCase().trim();
    const sec=SECTOR_MAP[sym];
    if(sec) secCount[sec]=(secCount[sec]||0)+1;
  });
  const top=Object.entries(secCount).sort((a,b)=>b[1]-a[1]).slice(0,4).map(e=>e[0]);
  const el=document.getElementById('s-sectors');
  el.innerHTML=top.length
    ? top.map(s=>`<span class="sec-chip">${s}</span>`).join('')
    : '<span class="sec-chip" style="color:var(--muted);border-color:var(--border);background:var(--bg4)">Varied</span>';

  // Market bias
  const t1=stocks.filter(s=>(s.weekly_tier||2)===1).length;
  const pct=stocks.length ? t1/stocks.length : 0.5;
  let biasLabel,biasColor,pinLeft;
  if(pct>0.6){biasLabel='Bullish';biasColor='#0fd49c';pinLeft=Math.min(85,60+pct*30);}
  else if(pct>0.4){biasLabel='Neutral';biasColor='#fbbf24';pinLeft=50;}
  else{biasLabel='Bearish';biasColor='#f87171';pinLeft=Math.max(15,pct*60);}
  document.getElementById('s-biasval').textContent=biasLabel;
  document.getElementById('s-biasval').style.color=biasColor;
  document.getElementById('s-biaspin').style.left=pinLeft+'%';

  document.getElementById('sbar').style.display='grid';
}

// ── BADGES ────────────────────────────────────────────────
function updateBadges(){
  const c={all:stocks.length};
  stocks.forEach(s=>{const sit=s.situation||'watch';c[sit]=(c[sit]||0)+1;});
  document.querySelectorAll('.tab').forEach(t=>{
    const sit=t.dataset.sit,n=c[sit]||0;
    t.querySelectorAll('.cnt').forEach(b=>b.remove());
    if(n>0){const b=document.createElement('span');b.className='cnt';b.textContent=n;t.appendChild(b);}
  });
}

// ── RENDER CARDS ─────────────────────────────────────────
function renderCards(){
  const el=document.getElementById('content');
  const filtered=filter==='all'?stocks:stocks.filter(s=>s.situation===filter);
  if(!filtered.length){
    el.innerHTML=`<div class="empty fade"><div class="empty-ico">🔍</div>
      <div class="empty-ttl">Nothing here today</div>
      <div class="empty-dsc">${filter==='prime'?'No Prime stocks today. Market may be consolidating.<br>Check Watch Closely for setups building up.':'Nothing in this category today.'}</div></div>`;
    return;
  }
  let html='';
  if(filter==='all'){
    SORD.forEach(sit=>{
      const grp=filtered.filter(s=>s.situation===sit); if(!grp.length)return;
      const sm=SIT[sit];
      html+=`<div class="sh ${sm.cls}"><span style="font-size:17px">${sm.icon}</span>
        <span class="sh-body">${sm.label}<span class="sh-sub">${sm.action}</span></span>
        <span class="sh-n">${grp.length}</span></div>`;
      grp.forEach((s,i)=>{ html+=buildCard(s,i*35); });
    });
  } else {
    const sm=SIT[filter];
    if(sm) html+=`<div class="sh ${sm.cls}"><span style="font-size:17px">${sm.icon}</span>
      <span class="sh-body">${sm.label}<span class="sh-sub">${sm.action}</span></span>
      <span class="sh-n">${filtered.length}</span></div>`;
    filtered.forEach((s,i)=>{ html+=buildCard(s,i*35); });
  }
  el.innerHTML=html;
  el.querySelectorAll('.card').forEach((c,i)=>c.style.animationDelay=`${i*30}ms`);
}

// ── BUILD CARD ────────────────────────────────────────────
function buildCard(s,delay=0){
  const sit =s.situation||'watch';
  const sc  =Math.round(s.score||0);
  const e   =s.close||0, sl=s.sl||e*0.93, t1=s.target1||e+(e-sl), t2=s.target2||e+2*(e-sl);
  const r3  =s.return_3m_pct||0, r1=s.return_1m_pct||0;
  const str =s.streak||0, ca=s.cross_age??999, dp=s.dist_pct||0;
  const wt  =s.weekly_tier||2, del=s.delivery_pct||0;
  const prog=t2>sl?Math.max(0,Math.min(100,(e-sl)/(t2-sl)*100)):20;
  const slp =e>0?((sl-e)/e*100).toFixed(1):0;
  const t1p =e>0?((t1-e)/e*100).toFixed(1):0;
  const t2p =e>0?((t2-e)/e*100).toFixed(1):0;

  // Matrix
  const {mx,dt,desc}=getMatrixLabel(s);
  const sitTag=`t-${sit}`;
  const wlabels={1:'W✅',2:'W🟡',3:'W❌'};
  const scColors={9:'var(--prime)',8:'#34d399',7:'#60a5fa',6:'#818cf8',5:'var(--hold)',4:'var(--book)'};
  const scCol=scColors[sc]||'var(--avoid)';

  // Frozen entry (for hold)
  let frozenHtml='';
  if(sit==='hold' && str>=3){
    const entryPL=e>0&&str>0?`+${((e/(e*0.97)-1)*100).toFixed(1)}%`:'';
    frozenHtml=`<div class="frozen">🔒 Entry frozen · entered ${str} days ago · P/L ${entryPL}</div>`;
  }

  // Pills
  const pills=buildPills(s);

  // Expandable info box (hidden by default — appears on tap)
  // News Tone badge (v7)
  let newsBadge = '';
  const nt = s.news_tone || 'NEUTRAL';
  if (nt === 'POSITIVE') newsBadge = `<span class="tag t-hc">🔥 Positive News</span>`;
  else if (nt === 'NEGATIVE' || s.has_risk) newsBadge = `<span class="tag t-fade">🛑 Risk Detected</span>`;

  const extra=buildExtra(s);

  return `
  <div class="card" data-sit="${sit}" data-sym="${s.symbol}" onclick="toggleCard(this)" style="animation:slideUp 0.3s ease ${delay}ms both;opacity:0">
    <style>@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}</style>
    <div class="ctop">
      <div>
        <div class="sym" onclick="openChart(event,'${s.symbol}')">${s.symbol} <span class="sym-ico">📈</span></div>
      </div>
      <div class="sring" style="border-color:${scCol}">
        <div class="sv">${sc}</div><div class="sm">/10</div>
      </div>
    </div>

    <div class="tags">
      <span class="tag ${sitTag}">${SIT[sit].icon} ${SIT[sit].label}</span>
      <span class="tag ${mx.t}">${mx.l}</span>
      <span class="tag ${dt.t}">${dt.l}</span>
      ${newsBadge}
    </div>
    <div class="mdesc">${desc}</div>

    ${frozenHtml}

    <div class="prow">
      <div class="price"><span class="rs">₹</span>${fmt(e)}</div>
      <span class="ret ${r3>=0?'rp':'rn'}">${r3>=0?'+':''}${r3.toFixed(1)}% <span class="rl">3M</span></span>
      <span class="ret ${r1>=0?'rp':'rn'}" style="font-size:10px">${r1>=0?'+':''}${r1.toFixed(1)}% <span class="rl">1M</span></span>
    </div>

    <div class="pb-wrap">
      <div class="pb-lbls"><span>SL ${fmt(sl)}</span><span style="color:var(--watch)">T1 ${fmt(t1)}</span><span style="color:var(--prime)">T2 ${fmt(t2)}</span></div>
      <div class="pb-track"><div class="pb-fill" style="width:100%"></div><div class="pb-dot" style="left:${prog}%"></div></div>
    </div>

    <div class="lvls">
      <div class="lr"><span class="ll">Entry</span><span class="lv">₹${fmt(e)}</span><span class="ll mla">SL</span><span class="lv lsl">₹${fmt(sl)}</span><span class="lc">${slp}%</span></div>
      <div class="lr"><span class="ll">T1</span><span class="lv lt1">₹${fmt(t1)}</span><span class="lc">+${t1p}%</span><span class="ll mla">T2</span><span class="lv lt2">₹${fmt(t2)}</span><span class="lc">+${t2p}%</span></div>
    </div>

    <div class="pills">${pills}</div>

    <div class="meta">
      <div>📦 <span class="mv">${del.toFixed(0)}%</span> delivery</div>
      ${str>=3?`<div>🔥 <span class="mv">${str}d</span> streak</div>`:''}
      <div style="margin-left:auto;font-size:10px">${s.weekly_label||wlabels[wt]||''}</div>
    </div>

    <!-- Expandable — hidden by default, shown on tap -->
    <div class="extra">${extra}</div>

    <!-- Expand hint -->
    <div class="hint">▾ Tap for details</div>
  </div>`;
}

// ── BUILD EXTRA (expandable content per situation) ────────
function buildExtra(s){
  const sit=s.strike||s.situation||'watch';
  const ca=s.cross_age??999, sl=s.sl||0, e=s.close||0;
  const str=s.streak||0;

  if(s.situation==='prime') return `
    <div class="ibox ib-prime">
      <div class="ibox-title" style="color:var(--prime)">📺 TradingView Confirmation</div>
      <div class="ibox-item"><span>○</span>REGIME = TREND (not Range or Correction)</div>
      <div class="ibox-item"><span>○</span>ADX ≥ 20 — trend strength confirmed</div>
      <div class="ibox-item"><span>○</span>W.Trend = BULL — weekly direction aligned</div>
      <div class="ibox-item"><span>○</span>HMA Hull V16.1 — all green, no warnings</div>
      <div class="ibox-item ok"><span>✓</span>All 4 confirmed → Enter at market open</div>
    </div>`;

  if(s.situation==='hold') return `
    <div class="ibox ib-hold">
      <div class="ibox-title" style="color:var(--hold)">📺 TradingView Trail Check</div>
      <div class="ibox-item"><span>○</span>HMA55 still pointing UP → trail SL up to it</div>
      <div class="ibox-item"><span>○</span>Price above HMA20 → short-term momentum intact</div>
      <div class="ibox-item"><span>○</span>REGIME still TREND → continue holding</div>
      <div class="ibox-item warn"><span>→</span>All green → Trail SL to ₹${fmt(sl)} (current HMA55)</div>
      <div class="ibox-note">${str>=5&&s.t1_hit_date?'T1 already hit → SL moved to entry. Free trade — let T2 run.':'T1 not yet hit → hold full position. Move SL up each week.'}</div>
    </div>`;

  if(s.situation==='watch') return `
    <div class="ibox ib-watch">
      <div class="ibox-title" style="color:var(--watch)">📺 What to Wait For</div>
      <div class="ibox-item"><span>○</span>Weekly HMA20 slope must turn UP (currently flat)</div>
      <div class="ibox-item"><span>○</span>Fresh volume surge needed — acc days ≥ 3</div>
      <div class="ibox-item"><span>○</span>Price must close convincingly above HMA55</div>
      <div class="ibox-item" style="color:var(--watch)"><span>→</span>Check again tomorrow after 6 AM scan</div>
      <div class="ibox-note">Do NOT enter yet. Wait for weekly alignment to confirm.</div>
    </div>`;

  if(s.situation==='book') return `
    <div class="ibox" style="background:rgba(251,146,60,0.05);border:1px solid rgba(251,146,60,0.2)">
      <div class="ibox-title" style="color:var(--book)">⚠️ Profit Booking Guidance</div>
      <div class="ibox-item"><span>○</span>${ca>30?`HMA cross was ${ca} days ago — move is very mature`:'Price stretched well above HMA55'}</div>
      <div class="ibox-item"><span>○</span>Consider booking 50% of open position now</div>
      <div class="ibox-item"><span>○</span>Move remaining SL to entry price (protect capital)</div>
      <div class="ibox-item" style="color:var(--book)"><span>→</span>Don't be greedy — protect what you have</div>
      <div class="ibox-note">Strong stocks can remain in list but late entry is risky.</div>
    </div>`;

  if(s.situation==='avoid') return `
    <div class="ibox ib-avoid">
      <div class="ibox-title" style="color:var(--avoid)">🚫 Why to Avoid Today</div>
      ${buildAvoidReasons(s).map(r=>`<div class="ibox-item bad"><span>×</span>${r}</div>`).join('')}
      <div class="ibox-note" style="color:rgba(248,113,113,0.7)">Skip this trade. Capital preservation is key.</div>
    </div>`;

  return '';
}

// ── AVOID REASONS ─────────────────────────────────────────
function buildAvoidReasons(s){
  const r=[], ca=s.cross_age??999, dp=s.dist_pct||0;
  const wt=s.weekly_tier||2, sc=s.score||0, dd=s.dist_days||0;
  const obv=s.obv_dir||'flat', del=s.delivery_pct||0;
  if(ca===-1)          r.push('HMA20 is <b>below</b> HMA55 — daily trend is bearish');
  else if(ca>30)       r.push(`HMA cross was <b>${ca} days ago</b> — very late in the move`);
  if(s.overextended)   r.push(`Price <b>${dp.toFixed(0)}% above</b> HMA55 — severely overextended`);
  if(dd>=4&&obv==='falling') r.push(`Distribution volume — ${dd} of last 5 days sell-side pressure`);
  else if(obv==='falling')   r.push('OBV trend falling — institutions selling into price');
  if(wt===3)           r.push('Weekly HMA20 <b>below</b> HMA55 — long-term trend broken');
  if(del<35)           r.push(`Low delivery ${del.toFixed(0)}% — mostly speculative retail trades`);
  if(sc<=3)            r.push(`Score ${sc}/10 — below quality threshold for safe entry`);
  if(r.length===0)     r.push('Multiple weak signals across HMA, volume and weekly trend');
  return r;
}

// ── PILLS ─────────────────────────────────────────────────
function buildPills(s){
  const p=[], ca=s.cross_age??999, dp=s.dist_pct||0;
  const acc=s.acc_days||0, dd=s.dist_days||0, obv=s.obv_dir||'flat', sb=s.sector_bias||0;
  if     (ca===-1)        p.push({l:'HMA ❌',c:'pb2'});
  else if(s.fresh_cross)  p.push({l:`🟢 Cross ${ca}d`,c:'pk'});
  else if(ca<=20)         p.push({l:`Cross ${ca}d`,c:'pm'});
  else if(ca<999)         p.push({l:`Cross ${ca}d`,c:''});
  if     (s.overextended) p.push({l:`${dp.toFixed(0)}% ⚠️`,c:'pb2'});
  else if(dp<=5&&dp>0)    p.push({l:`${dp.toFixed(1)}% ✅ room`,c:'pk'});
  else if(dp>0)           p.push({l:`${dp.toFixed(1)}% above`,c:''});
  if     (acc>=4&&obv==='rising') p.push({l:'Accum vol ✅',c:'pk'});
  else if(dd>=4||obv==='falling') p.push({l:'Dist vol ❌',c:'pb2'});
  else                            p.push({l:'Vol neutral',c:''});
  if     (sb===1)  p.push({l:'Sector ✅',c:'pk'});
  else if(sb===-1) p.push({l:'Sector ❌',c:'pb2'});
  return p.map(x=>`<span class="pill ${x.c}">${x.l}</span>`).join('');
}

// ── INTERACTIONS ──────────────────────────────────────────
function toggleCard(el){
  const sym=el.dataset.sym;
  if(expanded&&expanded!==sym){
    const prev=document.querySelector(`.card[data-sym="${expanded}"]`);
    if(prev){prev.classList.remove('open');const h=prev.querySelector('.hint');if(h)h.textContent='▾ Tap for details';}
  }
  el.classList.toggle('open');
  const isOpen=el.classList.contains('open');
  expanded=isOpen?sym:null;
  const hint=el.querySelector('.hint');
  if(hint) hint.textContent=isOpen?'▴ Tap to close':'▾ Tap for details';
  if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

function setFilter(sit){
  filter=sit;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.sit===sit));
  document.getElementById('tabsRow').style.display='';
  document.getElementById('sbar').style.display='grid';
  expanded=null;
  renderCards();
  window.scrollTo({top:0,behavior:'smooth'});
}

function switchView(v){
  view=v;
  ['Scan','Prime','List','News','Guide'].forEach(x=>
    document.getElementById('nb'+x)?.classList.toggle('on',x.toLowerCase()===v));
  const showTabs=['scan','prime'].includes(v);
  document.getElementById('tabsRow').style.display=showTabs?'':'none';
  document.getElementById('sbar').style.display=v==='scan'?'grid':'none';
  expanded=null;
  if     (v==='scan')  setFilter('all');
  else if(v==='prime') setFilter('prime');
  else if(v==='list')  renderList();
  else if(v==='news')  renderNews();
  else if(v==='guide') renderGuide();
}

// ── NEWS VIEW ─────────────────────────────────────────────
function renderNews(){
  const el=document.getElementById('content');
  if(!Object.keys(newsData).length){
    el.innerHTML=`<div class="empty fade"><div>📰</div><div class="empty-ttl">No news intelligence today</div></div>`;
    return;
  }
  let h=`<div style="margin-bottom:12px;font-size:12px;color:var(--muted);padding-top:4px">Intelligence from NSE & Financial Press</div>`;
  
  stocks.forEach(s => {
    const data = newsData[s.symbol];
    if(!data) return;
    
    const nt = data.news_tone || 'NEUTRAL';
    const ntCls = nt === 'POSITIVE' ? 't-prime' : nt === 'NEGATIVE' ? 't-avoid' : 't-bal';
    
    h += `<div style="margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span class="sym" style="font-size:15px">${s.symbol}</span>
        <span class="tag ${ntCls}" style="font-size:9px">${nt}</span>
      </div>`;
      
    // Show up to 2 announcements/headlines
    const items = [...(data.announcements||[]).map(a=>({t:'📢 '+a.subject, d:a.date})), 
                   ...(data.headlines||[]).map(hl=>({t:'📰 '+hl.title, d:hl.date}))].slice(0,3);
                   
    items.forEach(item => {
      h += `<div class="news-item">
        <div class="news-title">${item.t}</div>
        <div class="news-meta"><span>${item.d.slice(0,10)}</span></div>
      </div>`;
    });
    
    h += `</div>`;
  });
  el.innerHTML = h;
}
