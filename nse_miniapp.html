<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#07101f">
<title>NSE Scanner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap');

:root {
  --bg:      #07101f;
  --bg2:     #0d1a2e;
  --bg3:     #132338;
  --bg4:     #1a2d46;
  --border:  rgba(255,255,255,0.07);
  --text:    #dde6f4;
  --muted:   #5d718f;
  --accent:  #3b82f6;
  --prime:   #0fd49c;
  --hold:    #f59e0b;
  --watch:   #60a5fa;
  --book:    #fb923c;
  --avoid:   #f87171;
  --up:      #0fd49c;
  --dn:      #f87171;
  --sans: 'Outfit', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;min-height:100dvh;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit;-webkit-tap-highlight-color:transparent}

@keyframes spin   {to{transform:rotate(360deg)}}
@keyframes fadeUp {from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ── Header ── */
.hdr{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 14px 0}
.hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-size:14px;font-weight:800;letter-spacing:0.06em;color:var(--accent);font-family:var(--sans)}
.dt{font-size:11px;color:var(--muted);font-family:var(--mono)}
.rbtn{width:30px;height:30px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;transition:transform 0.3s}
.rbtn.spin{animation:spin 0.8s linear infinite}

/* ── Tabs ── */
.tabs{display:flex;gap:5px;overflow-x:auto;padding:8px 14px 7px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:5px 11px;border-radius:18px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--bg2);color:var(--muted);white-space:nowrap;transition:all 0.15s;font-family:var(--sans)}
.tab.on{color:#fff;border-color:transparent}
.tab[data-sit="all"].on  {background:var(--bg3);color:var(--text)}
.tab[data-sit="prime"].on{background:rgba(15,212,156,0.12);border-color:rgba(15,212,156,0.3);color:var(--prime)}
.tab[data-sit="hold"].on {background:rgba(245,158,11,0.12);border-color:rgba(245,158,11,0.3);color:var(--hold)}
.tab[data-sit="watch"].on{background:rgba(96,165,250,0.12);border-color:rgba(96,165,250,0.3);color:var(--watch)}
.tab[data-sit="book"].on {background:rgba(251,146,60,0.12);border-color:rgba(251,146,60,0.3);color:var(--book)}
.tab[data-sit="avoid"].on{background:rgba(248,113,113,0.12);border-color:rgba(248,113,113,0.3);color:var(--avoid)}
.cnt{background:rgba(255,255,255,0.14);border-radius:8px;padding:0 5px;font-size:10px;margin-left:3px;font-weight:700}

/* ── Content ── */
.content{flex:1;padding:8px 12px 88px}

/* ── Section headers ── */
.sh{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;margin:10px 0 7px;font-size:13px;font-weight:700;font-family:var(--sans)}
.sh-body{flex:1}
.sh-sub{display:block;font-size:11px;font-weight:400;opacity:0.72;margin-top:1px}
.sh-n{font-family:var(--mono);font-size:11px;opacity:0.6}
.sh-prime{background:rgba(15,212,156,0.08);border:1px solid rgba(15,212,156,0.22);color:var(--prime)}
.sh-hold {background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.22);color:var(--hold)}
.sh-watch{background:rgba(96,165,250,0.08);border:1px solid rgba(96,165,250,0.22);color:var(--watch)}
.sh-book {background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.22);color:var(--book)}
.sh-avoid{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.22);color:var(--avoid)}

/* ── Cards ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:13px 13px 13px 17px;margin-bottom:9px;cursor:pointer;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;transition:border-color 0.15s}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:2px 0 0 2px}
.card[data-sit="prime"]::before{background:var(--prime)}
.card[data-sit="hold"]::before {background:var(--hold)}
.card[data-sit="watch"]::before{background:var(--watch)}
.card[data-sit="book"]::before {background:var(--book)}
.card[data-sit="avoid"]::before{background:var(--avoid)}
.card.open{border-color:rgba(255,255,255,0.12)}
.card:active{opacity:0.88;transform:scale(0.99)}

.ctop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.sym{font-size:17px;font-weight:800;letter-spacing:0.02em;display:inline-flex;align-items:center;gap:5px}
.sym-ico{font-size:12px;opacity:0.4;transition:opacity 0.15s}
.card.open .sym-ico{opacity:0.7}
.sring{width:46px;height:46px;border-radius:50%;border:2.5px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.sv{font-family:var(--mono);font-size:14px;font-weight:700;line-height:1}
.sm{font-size:8px;color:var(--muted)}

/* Tags */
.tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;border:1px solid;font-family:var(--sans)}
.t-prime{color:var(--prime);border-color:rgba(15,212,156,0.3);background:rgba(15,212,156,0.09)}
.t-hold {color:var(--hold); border-color:rgba(245,158,11,0.3);background:rgba(245,158,11,0.09)}
.t-watch{color:var(--watch);border-color:rgba(96,165,250,0.3);background:rgba(96,165,250,0.09)}
.t-book {color:var(--book); border-color:rgba(251,146,60,0.3);background:rgba(251,146,60,0.09)}
.t-avoid{color:var(--avoid);border-color:rgba(248,113,113,0.3);background:rgba(248,113,113,0.09)}
.t-hc   {color:#0fd49c;border-color:rgba(15,212,156,0.25);background:rgba(15,212,156,0.07)}
.t-inst {color:#6ee7b7;border-color:rgba(110,231,183,0.25);background:rgba(110,231,183,0.07)}
.t-solid{color:#a3e635;border-color:rgba(163,230,53,0.25);background:rgba(163,230,53,0.07)}
.t-bal  {color:#94a3b8;border-color:rgba(148,163,184,0.25);background:rgba(148,163,184,0.07)}
.t-hype {color:#fb923c;border-color:rgba(251,146,60,0.25);background:rgba(251,146,60,0.07)}
.t-rebound{color:#fbbf24;border-color:rgba(251,191,36,0.25);background:rgba(251,191,36,0.07)}
.t-fade {color:#f87171;border-color:rgba(248,113,113,0.25);background:rgba(248,113,113,0.07)}
.t-retail{color:#f87171;border-color:rgba(248,113,113,0.2);background:rgba(248,113,113,0.06)}

.mdesc{font-size:11px;color:var(--muted);font-style:italic;margin-bottom:8px;font-family:var(--sans)}

/* Frozen badge */
.frozen{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;background:rgba(15,212,156,0.08);border:1px solid rgba(15,212,156,0.22);color:var(--prime);border-radius:7px;padding:3px 9px;margin-bottom:7px;font-family:var(--sans)}

/* Price row */
.prow{display:flex;align-items:baseline;gap:7px;flex-wrap:wrap;margin-bottom:8px}
.price{font-family:var(--mono);font-size:20px;font-weight:700}
.rs{font-size:12px;color:var(--muted)}
.ret{font-size:11px;font-weight:700;padding:2px 7px;border-radius:7px;font-family:var(--sans)}
.rp{color:var(--up);background:rgba(15,212,156,0.1)}
.rn{color:var(--dn);background:rgba(248,113,113,0.1)}
.rl{font-size:9px;opacity:0.7}

/* Progress bar */
.pb-wrap{margin-bottom:8px}
.pb-lbls{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:3px;font-family:var(--sans)}
.pb-track{height:5px;border-radius:3px;background:var(--bg4);position:relative;overflow:hidden}
.pb-fill{height:100%;background:linear-gradient(90deg,#f87171 0%,#fbbf24 48%,#0fd49c 100%)}
.pb-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid var(--bg2);box-shadow:0 0 4px rgba(255,255,255,0.4)}

/* Levels */
.lvls{background:var(--bg3);border-radius:8px;padding:9px 11px;margin-bottom:8px}
.lr{display:flex;font-size:11px;margin-bottom:5px;align-items:center;font-family:var(--sans)}
.lr:last-child{margin-bottom:0}
.ll{color:var(--muted);font-size:10px;min-width:32px}
.lv{font-family:var(--mono);font-size:12px;font-weight:600}
.lsl{color:var(--avoid)} .lt1{color:var(--watch)} .lt2{color:var(--prime)}
.lc{font-size:10px;color:var(--muted);margin-left:3px}
.mla{margin-left:auto}

/* Signal pills */
.pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-family:var(--sans)}
.pk{color:var(--prime);border-color:rgba(15,212,156,0.25);background:rgba(15,212,156,0.08)}
.pm{color:var(--hold);border-color:rgba(245,158,11,0.25);background:rgba(245,158,11,0.08)}
.pb2{color:var(--avoid);border-color:rgba(248,113,113,0.25);background:rgba(248,113,113,0.08)}

/* Meta */
.meta{display:flex;gap:10px;font-size:11px;color:var(--muted);flex-wrap:wrap;font-family:var(--sans)}
.mv{color:var(--text);font-weight:600}

/* ── Expand hint ── */
.hint{text-align:center;font-size:11px;color:var(--muted);padding:8px 0 2px;font-family:var(--sans);transition:color 0.15s;user-select:none}
.card.open .hint{color:var(--accent)}

/* ── Two-tab expand ── */
.expand-wrap{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);animation:fadeUp 0.2s ease}
.card.open .expand-wrap{display:block}
.card-tabs{display:flex;gap:6px;margin-bottom:10px}
.ct-btn{flex:1;padding:8px 4px;font-size:12px;font-weight:600;border-radius:8px;color:var(--muted);font-family:var(--sans);transition:all 0.15s;border:1px solid var(--border);background:var(--bg3)}
.ct-btn.on{background:rgba(255,255,255,0.08);color:var(--text);border-color:rgba(255,255,255,0.15)}
.ct-pane{display:none}
.ct-pane.show{display:block}

/* Info boxes */
.ibox{border-radius:9px;padding:10px 12px}
.ib-prime{background:rgba(15,212,156,0.05);border:1px solid rgba(15,212,156,0.2)}
.ib-hold {background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.2)}
.ib-watch{background:rgba(96,165,250,0.05);border:1px solid rgba(96,165,250,0.2)}
.ib-avoid{background:rgba(248,113,113,0.05);border:1px solid rgba(248,113,113,0.2)}
.ibox-title{font-size:11px;font-weight:700;margin-bottom:7px;font-family:var(--sans)}
.ibox-item{font-size:11px;color:var(--muted);display:flex;gap:5px;margin-bottom:4px;line-height:1.45;font-family:var(--sans)}
.ibox-item.ok  {color:var(--prime)}
.ibox-item.warn{color:var(--hold)}
.ibox-item.bad {color:var(--avoid)}
.ibox-note{font-size:10px;margin-top:7px;padding-top:7px;border-top:1px solid var(--border);opacity:0.7;font-family:var(--sans)}

/* ── News pane ── */
.news-item{display:flex;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)}
.news-item:last-child{border-bottom:none;padding-bottom:0}
.news-ico{font-size:14px;flex-shrink:0;margin-top:1px}
.news-body{flex:1;min-width:0}
.news-title{font-size:12px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:3px}
.news-meta{font-size:10px;color:var(--muted);font-family:var(--sans)}
.ntag{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;border:1px solid;margin-right:4px;display:inline-block;vertical-align:middle}
.nt-o{color:#0fd49c;border-color:rgba(15,212,156,0.35);background:rgba(15,212,156,0.08)}
.nt-r{color:#60a5fa;border-color:rgba(96,165,250,0.35);background:rgba(96,165,250,0.08)}
.nt-d{color:#f59e0b;border-color:rgba(245,158,11,0.35);background:rgba(245,158,11,0.08)}
.nt-x{color:#f87171;border-color:rgba(248,113,113,0.35);background:rgba(248,113,113,0.08)}
.nt-b{color:#a78bfa;border-color:rgba(167,139,250,0.35);background:rgba(167,139,250,0.08)}
.nt-n{color:var(--muted);border-color:var(--border);background:var(--bg3)}
.news-empty{font-size:12px;color:var(--muted);padding:18px 0;text-align:center;font-family:var(--sans)}

/* ── Compact card ── */
.ccard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px 10px 16px;margin-bottom:7px;position:relative;overflow:hidden;display:flex;align-items:center;gap:10px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.ccard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.cc-w::before{background:var(--watch)}
.cc-b::before{background:var(--book)}
.cc-sym{font-size:14px;font-weight:800;font-family:var(--sans)}
.cc-sub{font-size:10px;color:var(--muted);margin-top:2px;font-family:var(--sans)}
.cc-sc{font-family:var(--mono);font-size:13px;font-weight:700}
.more{text-align:center;font-size:11px;color:var(--muted);padding:3px 0 8px;font-family:var(--sans)}

/* ── Chart panel ── */
.cpanel{display:none;position:fixed;left:0;right:0;bottom:0;top:0;background:var(--bg);z-index:500;flex-direction:column}
.cpanel.open{display:flex}
.cp-hdr{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border);gap:10px;flex-shrink:0}
.cp-sym{font-size:18px;font-weight:800;flex:1;font-family:var(--sans)}
.cp-close{width:34px;height:34px;border-radius:9px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid var(--border)}
.cp-tabs{display:flex;gap:6px;padding:9px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.cp-tab{padding:5px 13px;border-radius:15px;font-size:12px;font-weight:600;background:var(--bg2);border:1px solid var(--border);color:var(--muted);font-family:var(--sans)}
.cp-tab.on{background:var(--accent);border-color:var(--accent);color:#fff}
.cp-body{flex:1;overflow:hidden}
.cp-body iframe{width:100%;height:100%;border:none}
.cp-note{padding:7px 16px;font-size:11px;color:var(--muted);text-align:center;border-top:1px solid var(--border);flex-shrink:0;font-family:var(--sans)}
.tv-open{padding:6px 12px;background:var(--accent);color:#fff;border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;font-family:var(--sans)}

/* ── Weekly Digest ── */
.dcard{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:10px;font-family:var(--sans)}
.dcard-title{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--accent)}
.drow{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:7px 0;border-bottom:1px solid var(--border)}
.drow:last-child{border-bottom:none;padding-bottom:0}
.dsym{font-weight:700;font-size:13px;font-family:var(--mono)}
.dmeta{font-size:10px;color:var(--muted);margin-top:2px}
.dret{font-family:var(--mono);font-size:12px;font-weight:700}
.dstats{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.dstat{flex:1;min-width:60px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:9px 8px;text-align:center}
.dstat-v{font-family:var(--mono);font-size:16px;font-weight:700;line-height:1}
.dstat-l{font-size:10px;color:var(--muted);margin-top:3px;font-family:var(--sans)}

/* ── Bottom nav ── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);display:flex;padding:7px 10px;padding-bottom:max(7px,env(safe-area-inset-bottom));gap:2px;z-index:200}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px;border-radius:9px;font-size:10px;color:var(--muted);font-weight:600;transition:all 0.15s;font-family:var(--sans)}
.nb .ni{font-size:19px;line-height:1}
.nb.on{background:var(--bg3);color:var(--accent)}

/* ── Misc ── */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px;color:var(--muted);font-family:var(--sans)}
.lring{width:38px;height:38px;border-radius:50%;border:3px solid var(--bg3);border-top-color:var(--accent);animation:spin 0.8s linear infinite}
.empty{text-align:center;padding:50px 24px;color:var(--muted);font-family:var(--sans)}
.empty-ico{font-size:44px;margin-bottom:14px}
.empty-ttl{font-size:17px;font-weight:700;color:var(--text);margin-bottom:8px}
.empty-dsc{font-size:13px;line-height:1.65}
.fade{animation:fadeUp 0.2s ease}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="hrow">
    <div class="logo">NSE SCANNER</div>
    <div class="dt" id="scanDate">—</div>
    <button class="rbtn" id="rbtn" onclick="reload()">↻</button>
  </div>
  <!-- Situation filter tabs -->
  <div class="tabs" id="tabsRow">
    <button class="tab on" data-sit="all"   onclick="setFilter('all')">All</button>
    <button class="tab"    data-sit="prime" onclick="setFilter('prime')">🎯 Prime</button>
    <button class="tab"    data-sit="hold"  onclick="setFilter('hold')">💰 Hold</button>
    <button class="tab"    data-sit="watch" onclick="setFilter('watch')">👀 Watch</button>
    <button class="tab"    data-sit="book"  onclick="setFilter('book')">⚠️ Book</button>
    <button class="tab"    data-sit="avoid" onclick="setFilter('avoid')">🚫 Avoid</button>
  </div>
</div>

<!-- Main content -->
<div class="content" id="content">
  <div class="loader"><div class="lring"></div><div>Loading scan data…</div></div>
</div>

<!-- Chart panel -->
<div class="cpanel" id="cpanel">
  <div class="cp-hdr">
    <div class="cp-sym" id="cpSym">—</div>
    <a class="tv-open" id="cpTvLink" href="#" target="_blank">Open TV ↗</a>
    <button class="cp-close" onclick="closeChart()">✕</button>
  </div>
  <div class="cp-tabs">
    <button class="cp-tab"    onclick="setRange('1M',this)">1M</button>
    <button class="cp-tab on" onclick="setRange('3M',this)">3M</button>
    <button class="cp-tab"    onclick="setRange('6M',this)">6M</button>
    <button class="cp-tab"    onclick="setRange('1Y',this)">1Y</button>
  </div>
  <div class="cp-body" id="cpBody"></div>
  <div class="cp-note">TradingView chart · Tap "Open TV ↗" for HMA indicators</div>
</div>

<!-- Bottom Nav — 5 tabs -->
<div class="bnav">
  <button class="nb on" id="nbScan"   onclick="switchView('scan')"  ><span class="ni">📊</span>Scan</button>
  <button class="nb"    id="nbPrime"  onclick="switchView('prime')" ><span class="ni">🎯</span>Prime</button>
  <button class="nb"    id="nbDigest" onclick="switchView('digest')"><span class="ni">📅</span>Digest</button>
  <button class="nb"    id="nbList"   onclick="switchView('list')"  ><span class="ni">☰</span>List</button>
  <button class="nb"    id="nbGuide"  onclick="switchView('guide')" ><span class="ni">📖</span>Guide</button>
</div>

<script>
// ── Config ────────────────────────────────────────────────
var DATA_URL   = 'https://raw.githubusercontent.com/JayeshSRathod/nse-scanner/main/telegram_last_scan.json';
var CACHE_KEY  = 'nse_v5';
var GITHUB_RAW = 'https://raw.githubusercontent.com/JayeshSRathod/nse-scanner/main/';
var tg = window.Telegram ? window.Telegram.WebApp : null;
if(tg){ tg.ready(); tg.expand(); tg.setHeaderColor('#07101f'); tg.setBackgroundColor('#07101f'); }

// ── State ──────────────────────────────────────────────────
var stocks=[], scanDate='', filter='all', view='scan', expanded=null, chartSym=null, chartRange='3M';
var newsData={}, newsLoaded=false;

// ── Situation config ──────────────────────────────────────
var SIT={
  prime:{icon:'🎯',label:'Prime Entry',   action:'Enter today — confirm on TradingView', cls:'sh-prime'},
  hold: {icon:'💰',label:'Hold & Trail',  action:'Already in move — trail your stop loss up', cls:'sh-hold'},
  watch:{icon:'👀',label:'Watch Closely', action:'Good setup — one signal missing. Check tomorrow.', cls:'sh-watch'},
  book: {icon:'⚠️',label:'Book Profits', action:'Move maturing — consider booking 50-100%', cls:'sh-book'},
  avoid:{icon:'🚫',label:'Avoid Now',     action:'Weak signal or bearish — skip today', cls:'sh-avoid'}
};
var SORD=['prime','hold','watch','book','avoid'];

// ── Matrix label ──────────────────────────────────────────
function getMatrixLabel(s){
  var sc=s.score||0, del=s.delivery_pct||0, ca=(s.cross_age!==undefined&&s.cross_age!==null)?s.cross_age:999;
  var overext=s.overextended||false;
  var delCol = del>=50?'inst': del>=30?'bal':'retail';
  var trendRow;
  if(sc>=7 && ca<=20 && !overext)  trendRow='strong';
  else if(sc>=5 && ca<=30)         trendRow='reversal';
  else if(overext || sc<=4)        trendRow='exhaust';
  else                             trendRow='flat';
  var matrix={
    strong:  {inst:{t:'t-hc',     l:'🏆 High Conviction'},  bal:{t:'t-solid',  l:'⚡ Solid Momentum'},  retail:{t:'t-hype',   l:'⚠️ Retail Hype'}},
    reversal:{inst:{t:'t-rebound',l:'🔄 Potential Rebound'}, bal:{t:'t-bal',    l:'👁 Watch & Wait'},    retail:{t:'t-hype',   l:'🎲 Retail Bounce'}},
    exhaust: {inst:{t:'t-fade',   l:'📉 Fading Move'},       bal:{t:'t-fade',   l:'💨 Losing Steam'},    retail:{t:'t-fade',   l:'🔴 Retail Exhaustion'}},
    flat:    {inst:{t:'t-bal',    l:'🔍 Accumulation?'},     bal:{t:'t-bal',    l:'↔ Sideways Mode'},    retail:{t:'t-retail', l:'😴 Low Interest'}}
  };
  var delTag={
    inst:  {t:'t-inst',   l:'🏦 Institutional Backed'},
    bal:   {t:'t-bal',    l:'⚖️ Balanced'},
    retail:{t:'t-retail', l:'📉 Retail Driven'}
  };
  var trendDesc={strong:'Strong Trend',reversal:'Short-term Reversal',exhaust:'Exhaustion',flat:'Flat / Weak'};
  var delDesc  ={inst:'>50% delivery',bal:'30-50% delivery',retail:'<30% delivery'};
  var mx  = matrix[trendRow][delCol];
  var dt  = delTag[delCol];
  var desc= trendDesc[trendRow]+' · '+delDesc[delCol];
  return {mx:mx, dt:dt, desc:desc};
}

// ── DATA ──────────────────────────────────────────────────
function loadData(force){
  var btn=document.getElementById('rbtn'); btn.classList.add('spin');
  if(!force){
    var c=sessionStorage.getItem(CACHE_KEY);
    if(c){ try{ var p=JSON.parse(c); if(p.stocks&&p.stocks.length){ renderAll(p); btn.classList.remove('spin'); return; } }catch(e){} }
  }
  fetch(DATA_URL+'?t='+Date.now())
    .then(function(r){ if(!r.ok) throw new Error('bad'); return r.json(); })
    .then(function(d){ sessionStorage.setItem(CACHE_KEY,JSON.stringify(d)); renderAll(d); })
    .catch(function(){ var c=sessionStorage.getItem(CACHE_KEY); if(c){ try{ renderAll(JSON.parse(c)); }catch(e){ renderSample(); } }else{ renderSample(); } })
    .finally(function(){ btn.classList.remove('spin'); });
}
function reload(){ sessionStorage.removeItem(CACHE_KEY); loadData(true); }

// ── RENDER ALL ────────────────────────────────────────────
function renderAll(data){
  stocks=data.stocks||[]; scanDate=data.scan_date||'';
  try{
    var d=new Date(scanDate+'T00:00:00');
    document.getElementById('scanDate').textContent=d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  }catch(e){}
  updateBadges();
  renderCards();
  fetchNews(scanDate);
}

// ── BADGES ────────────────────────────────────────────────
function updateBadges(){
  var c={all:stocks.length};
  stocks.forEach(function(s){ var sit=s.situation||'watch'; c[sit]=(c[sit]||0)+1; });
  document.querySelectorAll('.tab').forEach(function(t){
    var sit=t.dataset.sit, n=c[sit]||0;
    t.querySelectorAll('.cnt').forEach(function(b){ b.remove(); });
    if(n>0){ var b=document.createElement('span'); b.className='cnt'; b.textContent=n; t.appendChild(b); }
  });
}

// ── RENDER CARDS ─────────────────────────────────────────
function renderCards(){
  var el=document.getElementById('content');
  var filtered=filter==='all' ? stocks : stocks.filter(function(s){ return s.situation===filter; });
  if(!filtered.length){
    el.innerHTML='<div class="empty fade"><div class="empty-ico">🔍</div>'
      +'<div class="empty-ttl">Nothing here today</div>'
      +'<div class="empty-dsc">'+(filter==='prime'?'No Prime stocks today. Market may be consolidating.<br>Check Watch Closely for setups building up.':'Nothing in this category today.')+'</div></div>';
    return;
  }
  var html='';
  if(filter==='all'){
    SORD.forEach(function(sit){
      var grp=filtered.filter(function(s){ return s.situation===sit; }); if(!grp.length) return;
      var sm=SIT[sit];
      html+='<div class="sh '+sm.cls+'"><span style="font-size:17px">'+sm.icon+'</span>'
           +'<span class="sh-body">'+sm.label+'<span class="sh-sub">'+sm.action+'</span></span>'
           +'<span class="sh-n">'+grp.length+'</span></div>';
      grp.forEach(function(s,i){ html+=buildCard(s,i*35); });
    });
  } else {
    var sm=SIT[filter];
    if(sm) html+='<div class="sh '+sm.cls+'"><span style="font-size:17px">'+sm.icon+'</span>'
                +'<span class="sh-body">'+sm.label+'<span class="sh-sub">'+sm.action+'</span></span>'
                +'<span class="sh-n">'+filtered.length+'</span></div>';
    filtered.forEach(function(s,i){ html+=buildCard(s,i*35); });
  }
  el.innerHTML=html;
  el.querySelectorAll('.card').forEach(function(c,i){ c.style.animationDelay=(i*30)+'ms'; });
}

// ── BUILD CARD ────────────────────────────────────────────
function buildCard(s,delay){
  delay=delay||0;
  var sit =s.situation||'watch';
  var sc  =Math.round(s.score||0);
  var e   =s.close||0, sl=s.sl||e*0.93, t1=s.target1||e+(e-sl), t2=s.target2||e+2*(e-sl);
  var r3  =s.return_3m_pct||0, r1=s.return_1m_pct||0;
  var str =s.streak||0;
  var ca  =(s.cross_age!==undefined&&s.cross_age!==null)?s.cross_age:999;
  var dp  =s.dist_pct||0;
  var wt  =s.weekly_tier||2, del=s.delivery_pct||0;
  var prog=t2>sl ? Math.max(0,Math.min(100,(e-sl)/(t2-sl)*100)) : 20;
  var slp =e>0 ? ((sl-e)/e*100).toFixed(1) : 0;
  var t1p =e>0 ? ((t1-e)/e*100).toFixed(1) : 0;
  var t2p =e>0 ? ((t2-e)/e*100).toFixed(1) : 0;

  var ml=getMatrixLabel(s);
  var sitTag='t-'+sit;
  var wlabels={1:'W✅',2:'W🟡',3:'W❌'};
  var scColors={9:'var(--prime)',8:'#34d399',7:'#60a5fa',6:'#818cf8',5:'var(--hold)',4:'var(--book)'};
  var scCol=scColors[sc]||'var(--avoid)';

  var frozenHtml='';
  if(sit==='hold' && str>=3){
    var entryPL=e>0 ? '+'+((e/(e*0.97)-1)*100).toFixed(1)+'%' : '';
    frozenHtml='<div class="frozen">🔒 Entry frozen · entered '+str+' days ago · P/L '+entryPL+'</div>';
  }

  var pills=buildPills(s);
  var extra=buildExtra(s);

  var sym=s.symbol||'';
  var wkl=s.weekly_label||wlabels[wt]||'';
  var r3cls=r3>=0?'rp':'rn', r1cls=r1>=0?'rp':'rn';

  var html='<div class="card" data-sit="'+sit+'" data-sym="'+sym+'" onclick="toggleCard(this)"'
    +' style="animation:slideUp 0.3s ease '+delay+'ms both;opacity:0">'
    +'<div class="ctop">'
    +'<div><div class="sym" onclick="openChart(event,\''+sym+'\')">'+sym+' <span class="sym-ico">📈</span></div></div>'
    +'<div class="sring" style="border-color:'+scCol+'"><div class="sv">'+sc+'</div><div class="sm">/10</div></div>'
    +'</div>'
    +'<div class="tags">'
    +'<span class="tag '+sitTag+'">'+SIT[sit].icon+' '+SIT[sit].label+'</span>'
    +'<span class="tag '+ml.mx.t+'">'+ml.mx.l+'</span>'
    +'<span class="tag '+ml.dt.t+'">'+ml.dt.l+'</span>'
    +'</div>'
    +'<div class="mdesc">'+ml.desc+'</div>'
    +frozenHtml
    +'<div class="prow">'
    +'<div class="price"><span class="rs">₹</span>'+fmt(e)+'</div>'
    +'<span class="ret '+r3cls+'">'+(r3>=0?'+':'')+r3.toFixed(1)+'% <span class="rl">3M</span></span>'
    +'<span class="ret '+r1cls+'" style="font-size:10px">'+(r1>=0?'+':'')+r1.toFixed(1)+'% <span class="rl">1M</span></span>'
    +'</div>'
    +'<div class="pb-wrap">'
    +'<div class="pb-lbls"><span>SL '+fmt(sl)+'</span><span style="color:var(--watch)">T1 '+fmt(t1)+'</span><span style="color:var(--prime)">T2 '+fmt(t2)+'</span></div>'
    +'<div class="pb-track"><div class="pb-fill" style="width:100%"></div><div class="pb-dot" style="left:'+prog+'%"></div></div>'
    +'</div>'
    +'<div class="lvls">'
    +'<div class="lr"><span class="ll">Entry</span><span class="lv">₹'+fmt(e)+'</span><span class="ll mla">SL</span><span class="lv lsl">₹'+fmt(sl)+'</span><span class="lc">'+slp+'%</span></div>'
    +'<div class="lr"><span class="ll">T1</span><span class="lv lt1">₹'+fmt(t1)+'</span><span class="lc">+'+t1p+'%</span><span class="ll mla">T2</span><span class="lv lt2">₹'+fmt(t2)+'</span><span class="lc">+'+t2p+'%</span></div>'
    +'</div>'
    +'<div class="pills">'+pills+'</div>'
    +'<div class="meta">'
    +'<div>📦 <span class="mv">'+del.toFixed(0)+'%</span> delivery</div>'
    +(str>=3 ? '<div>🔥 <span class="mv">'+str+'d</span> streak</div>' : '')
    +'<div style="margin-left:auto;font-size:10px">'+wkl+'</div>'
    +'</div>'
    +'<div class="expand-wrap">'
    +'<div class="card-tabs">'
    +'<button class="ct-btn on" onclick="cardTab(event,\'dt-'+sym+'\',\'nt-'+sym+'\',this)">📺 Details</button>'
    +'<button class="ct-btn"    onclick="cardTab(event,\'nt-'+sym+'\',\'dt-'+sym+'\',this)">📰 News</button>'
    +'</div>'
    +'<div class="ct-pane show" id="dt-'+sym+'">'+extra+'</div>'
    +'<div class="ct-pane"      id="nt-'+sym+'"><div class="news-empty">📰 Loading news…</div></div>'
    +'</div>'
    +'<div class="hint">▾ Tap for details</div>'
    +'</div>';
  return html;
}

  if(sit==='prime'){
    return '<div class="ibox ib-prime">'
      +'<div class="ibox-title" style="color:var(--prime)">📺 TradingView Confirmation</div>'

      +'<div class="ibox-item"><span>○</span>ADX ≥ 20 — trend strength confirmed</div>'
      +'<div class="ibox-item"><span>○</span>W.Trend = BULL — weekly direction aligned</div>'
      +'<div class="ibox-item"><span>○</span>HMA Hull V16.1 — all green, no warnings</div>'

      +'<div class="ibox-item"><span>○</span>Price above HMA20 → short-term momentum intact</div>'
      +'<div class="ibox-item"><span>○</span>REGIME still TREND → continue holding</div>'
      +'<div class="ibox-item warn"><span>→</span>All green → Trail SL to ₹'+fmt(sl)+' (current HMA55)</div>'

      +'<div class="ibox-title" style="color:var(--watch)">📺 What to Wait For</div>'
      +'<div class="ibox-item"><span>○</span>Weekly HMA20 slope must turn UP (currently flat)</div>'
      +'<div class="ibox-item"><span>○</span>Fresh volume surge needed — acc days ≥ 3</div>'
      +'<div class="ibox-item"><span>○</span>Price must close convincingly above HMA55</div>'
      +'<div class="ibox-item" style="color:var(--watch)"><span>→</span>Check again tomorrow after 6 AM scan</div>'
      +'<div class="ibox-note">Do NOT enter yet. Wait for weekly alignment to confirm.</div>'
      +'</div>';
  }
  if(sit==='book'){
    var msg=ca>30 ? 'HMA cross was '+ca+' days ago — move is very mature' : 'Price stretched well above HMA55';
    return '<div class="ibox" style="background:rgba(251,146,60,0.05);border:1px solid rgba(251,146,60,0.2)">'
      +'<div class="ibox-title" style="color:var(--book)">⚠️ Profit Booking Guidance</div>'
      +'<div class="ibox-item"><span>○</span>'+msg+'</div>'
      +'<div class="ibox-item"><span>○</span>Consider booking 50% of open position now</div>'
      +'<div class="ibox-item"><span>○</span>Move remaining SL to entry price (protect capital)</div>'

  }
  if(sit==='avoid'){
    var reasons=buildAvoidReasons(s);
    return '<div class="ibox ib-avoid">'

      +reasons.map(function(r){ return '<div class="ibox-item bad"><span>×</span>'+r+'</div>'; }).join('')
      +'<div class="ibox-note" style="color:rgba(248,113,113,0.7)">Skip this trade. Capital preservation is key.</div>'
      +'</div>';

// ── AVOID REASONS ─────────────────────────────────────────
function buildAvoidReasons(s){
  var r=[];
  var ca  =(s.cross_age!==undefined&&s.cross_age!==null)?s.cross_age:999;
  var dp  =s.dist_pct||0, wt=s.weekly_tier||2, sc=s.score||0;
  var dd  =s.dist_days||0, obv=s.obv_dir||'flat', del=s.delivery_pct||0;
  if(ca===-1)           r.push('HMA20 is below HMA55 — daily trend is bearish');
  else if(ca>30)        r.push('HMA cross was '+ca+' days ago — very late in the move');
  if(s.overextended)    r.push('Price '+dp.toFixed(0)+'% above HMA55 — severely overextended');
  if(dd>=4&&obv==='falling') r.push('Distribution volume — '+dd+' of last 5 days sell-side pressure');
  else if(obv==='falling')   r.push('OBV trend falling — institutions selling into price');
  if(wt===3)            r.push('Weekly HMA20 below HMA55 — long-term trend broken');
  if(del<35)            r.push('Low delivery '+del.toFixed(0)+'% — mostly speculative retail trades');
  if(sc<=3)             r.push('Score '+sc+'/10 — below quality threshold for safe entry');
  if(r.length===0)      r.push('Multiple weak signals across HMA, volume and weekly trend');
  return r;
}

// ── PILLS ─────────────────────────────────────────────────
function buildPills(s){
  var p=[];
  var ca =(s.cross_age!==undefined&&s.cross_age!==null)?s.cross_age:999;
  var dp =s.dist_pct||0, acc=s.acc_days||0, dd=s.dist_days||0;
  var obv=s.obv_dir||'flat', sb=s.sector_bias||0;
  if     (ca===-1)       p.push({l:'HMA ❌',c:'pb2'});
  else if(s.fresh_cross) p.push({l:'🟢 Cross '+ca+'d',c:'pk'});
  else if(ca<=20)        p.push({l:'Cross '+ca+'d',c:'pm'});
  else if(ca<999)        p.push({l:'Cross '+ca+'d',c:''});
  if     (s.overextended)     p.push({l:dp.toFixed(0)+'% ⚠️',c:'pb2'});
  else if(dp<=5 && dp>0)      p.push({l:dp.toFixed(1)+'% ✅ room',c:'pk'});
  else if(dp>0)               p.push({l:dp.toFixed(1)+'% above',c:''});
  if     (acc>=4&&obv==='rising')   p.push({l:'Accum vol ✅',c:'pk'});
  else if(dd>=4||obv==='falling')   p.push({l:'Dist vol ❌',c:'pb2'});
  else                              p.push({l:'Vol neutral',c:''});
  if     (sb===1)  p.push({l:'Sector ✅',c:'pk'});
  else if(sb===-1) p.push({l:'Sector ❌',c:'pb2'});
  return p.map(function(x){ return '<span class="pill '+x.c+'">'+x.l+'</span>'; }).join('');
}

// ── CARD INTERACTIONS ─────────────────────────────────────
function toggleCard(el){
  var sym=el.dataset.sym;
  if(expanded && expanded!==sym){
    var prev=document.querySelector('.card[data-sym="'+expanded+'"]');
    if(prev){
      prev.classList.remove('open');
      var ph=prev.querySelector('.hint');
      if(ph) ph.textContent='▾ Tap for details';
    }
  }
  el.classList.toggle('open');
  var isOpen=el.classList.contains('open');
  expanded=isOpen?sym:null;
  var hint=el.querySelector('.hint');
  if(hint) hint.textContent=isOpen?'▴ Tap to close':'▾ Tap for details';
  if(isOpen){
    var np=document.getElementById('nt-'+sym);
    if(np && np.querySelector('.news-empty')){
      if(newsLoaded){
        np.innerHTML=buildNewsPane(sym);
      } else {
        fetchNews(scanDate).then(function(){ np.innerHTML=buildNewsPane(sym); });
      }
    }
  }
  if(tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

function cardTab(e,showId,hideId,btn){
  e.stopPropagation();
  var sp=document.getElementById(showId);
  var hp=document.getElementById(hideId);
  if(sp) sp.classList.add('show');
  if(hp) hp.classList.remove('show');
  var tabs=btn.parentElement.querySelectorAll('.ct-btn');
  tabs.forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
}

function setFilter(sit){
  filter=sit;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.toggle('on',t.dataset.sit===sit); });
  document.getElementById('tabsRow').style.display='';
  expanded=null;
  renderCards();
  window.scrollTo({top:0,behavior:'smooth'});
}

function switchView(v){
  view=v;
  ['Scan','Prime','Digest','List','Guide'].forEach(function(x){
    var el=document.getElementById('nb'+x);
    if(el) el.classList.toggle('on',x.toLowerCase()===v);
  });
  var showTabs=['scan','prime'].includes(v);
  document.getElementById('tabsRow').style.display=showTabs?'':'none';
  expanded=null;
  if     (v==='scan')   setFilter('all');
  else if(v==='prime')  setFilter('prime');
  else if(v==='digest') renderDigest();
  else if(v==='list')   renderList();
  else if(v==='guide')  renderGuide();
}

// ── CHART ─────────────────────────────────────────────────
function openChart(e,sym){
  e.stopPropagation();
  chartSym=sym; chartRange='3M';
  document.getElementById('cpSym').textContent=sym+' — NSE';
  document.getElementById('cpTvLink').href='https://www.tradingview.com/chart/?symbol=NSE%3A'+sym;
  document.querySelectorAll('.cp-tab').forEach(function(t,i){ t.classList.toggle('on',i===1); });
  renderChart();
  document.getElementById('cpanel').classList.add('open');
  if(tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
}
function closeChart(){
  document.getElementById('cpanel').classList.remove('open');
  document.getElementById('cpBody').innerHTML='';
  chartSym=null;
}
function setRange(r,btn){
  chartRange=r;
  document.querySelectorAll('.cp-tab').forEach(function(t){ t.classList.remove('on'); });
  btn.classList.add('on');
  renderChart();
}
function renderChart(){
  if(!chartSym) return;
  var rm={'1M':'1M','3M':'3M','6M':'6M','1Y':'12M'};
  document.getElementById('cpBody').innerHTML='<iframe src="https://s.tradingview.com/widgetembed/?frameElementId=tv&symbol=NSE%3A'+chartSym+'&interval=D&theme=dark&style=1&timezone=Asia%2FKolkata&withdateranges=1&daterange='+(rm[chartRange]||'3M')+'&hide_side_toolbar=1&allow_symbol_change=0" width="100%" height="100%" frameborder="0"></iframe>';
}

// ── NEWS ──────────────────────────────────────────────────
function fetchNews(dateStr){
  if(newsLoaded) return Promise.resolve();
  if(!dateStr) return Promise.resolve();
  var parts=dateStr.split('-');
  if(parts.length!==3){ newsLoaded=true; return Promise.resolve(); }
  var fname='news_'+parts[2]+parts[1]+parts[0]+'.json';
  var url=GITHUB_RAW+'output/'+fname+'?t='+Date.now();
  return fetch(url)
    .then(function(r){ if(r.ok) return r.json(); throw new Error('no news'); })
    .then(function(d){ newsData=d; })
    .catch(function(){})
    .then(function(){ newsLoaded=true; });
}

function buildNewsPane(sym){
  var nd=newsData[sym];
  if(!nd) return '<div class="news-empty">📰 No recent news for '+sym+'</div>';
  var anns =(nd.announcements||[]).slice(0,4);
  var deals=(nd.deals||[]).slice(0,3);
  var hls  =(nd.headlines||[]).slice(0,4);
  if(!anns.length&&!deals.length&&!hls.length)
    return '<div class="news-empty">📰 No recent news for '+sym+'</div>';
  var tmap={
    ORDER_WIN:  {c:'nt-o',l:'Order'},    RESULTS:{c:'nt-r',l:'Results'},
    DEAL:       {c:'nt-d',l:'Deal'},      FUNDRAISING:{c:'nt-d',l:'Funds'},
    REGULATORY: {c:'nt-x',l:'Regulatory'},CORPORATE_ACTION:{c:'nt-b',l:'Corp Action'},
    MEETING:    {c:'nt-n',l:'Meeting'},   EXPANSION:{c:'nt-o',l:'Expansion'},
    PROMOTER:   {c:'nt-x',l:'Promoter'}, GENERAL:{c:'nt-n',l:'Ann'}
  };
  var html='';
  anns.forEach(function(a){
    var tm=tmap[a.type]||{c:'nt-n',l:'Ann'};
    var subj=(a.subject||'').substring(0,80);
    html+='<div class="news-item"><div class="news-ico">📢</div>'
      +'<div class="news-body"><div class="news-title"><span class="ntag '+tm.c+'">'+tm.l+'</span>'+subj+'</div>'
      +'<div class="news-meta">'+((a.date||'').substring(0,10))+'</div></div></div>';
  });
  deals.forEach(function(d){
    var bs=(d.buy_sell||'').toUpperCase();
    var flg=d.flag||'';
    var ico=bs==='B'?'🏦':'⚠️';
    var cls=flg.indexOf('INSTITUTION_BUY')>=0?'nt-o':flg.indexOf('PROMOTER_SELL')>=0?'nt-x':'nt-b';
    var client=(d.client||'').substring(0,35);
    var qty=d.quantity?parseInt(d.quantity).toLocaleString('en-IN'):'';
    html+='<div class="news-item"><div class="news-ico">'+ico+'</div>'
      +'<div class="news-body"><div class="news-title"><span class="ntag '+cls+'">'+(bs==='B'?'Buy':'Sell')+'</span>'+client+'</div>'
      +'<div class="news-meta">'+(qty?qty+' shares · ':'')+(d.date||'')+'</div></div></div>';
  });
  hls.forEach(function(h){
    var sent=h.sentiment||'NEUTRAL';
    var ico=sent==='POSITIVE'?'📈':sent==='NEGATIVE'?'📉':'📰';
    var title=(h.title||'').substring(0,80);
    var src2=h.news_source||'';
    var dt  =h.date||'';
    html+='<div class="news-item"><div class="news-ico">'+ico+'</div>'
      +'<div class="news-body"><div class="news-title">'+title+'</div>'
      +'<div class="news-meta">'+src2+(src2&&dt?' · ':'')+dt+'</div></div></div>';
  });
  return html;
}

// ── WEEKLY DIGEST ─────────────────────────────────────────
function renderDigest(){
  var el=document.getElementById('content');
  el.innerHTML='<div class="loader"><div class="lring"></div><div>Loading digest…</div></div>';
  fetch(GITHUB_RAW+'scan_history.json?t='+Date.now())
    .then(function(r){ if(r.ok) return r.json(); throw new Error('no history'); })
    .then(function(d){ buildDigestView(d.history||[]); })
    .catch(function(){ buildDigestView([]); });
}

function buildDigestView(hist){
  var el=document.getElementById('content');
  if(!hist.length){
    el.innerHTML='<div class="empty fade"><div class="empty-ico">📅</div>'
      +'<div class="empty-ttl">No digest yet</div>'
      +'<div class="empty-dsc">History builds after a few trading days.</div></div>';
    return;
  }
  function fmtD(str){
    try{ var d=new Date(str+'T00:00:00'); return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'}); }
    catch(e){ return str; }
  }
  var totalDays=hist.length;
  var freq={};
  hist.forEach(function(h){
    (h.symbols||[]).forEach(function(s){ freq[s]=(freq[s]||0)+1; });
  });
  var consistent=Object.keys(freq)
    .filter(function(s){ return freq[s]>=5; })
    .sort(function(a,b){ return freq[b]-freq[a]; })
    .slice(0,5);
  var today2=new Date();
  var dow=today2.getDay();
  var daysToMon=dow===0?6:dow-1;
  var thisMon=new Date(today2); thisMon.setDate(today2.getDate()-daysToMon);
  var lastFri=new Date(thisMon); lastFri.setDate(thisMon.getDate()-3);
  var lastMon=new Date(lastFri); lastMon.setDate(lastFri.getDate()-4);
  function isoDate(d){ return d.toISOString().split('T')[0]; }
  var monStr=isoDate(lastMon), friStr=isoDate(lastFri);
  var weekHist=hist.filter(function(h){ return h.date>=monStr&&h.date<=friStr; });
  var weekSyms=[];
  weekHist.forEach(function(h){ (h.symbols||[]).forEach(function(s){ if(weekSyms.indexOf(s)<0) weekSyms.push(s); }); });
  var weekPrime=[];
  weekHist.forEach(function(h){
    (h.stocks||[]).forEach(function(s){ if(s.situation==='prime') weekPrime.push(s); });
  });
  var sitC={prime:0,hold:0,watch:0,book:0,avoid:0};
  weekHist.forEach(function(h){
    (h.stocks||[]).forEach(function(s){ if(s.situation in sitC) sitC[s.situation]++; });
  });
  var best=null,worst=null;
  weekHist.forEach(function(h){
    (h.stocks||[]).forEach(function(s){
      var r=s.return_3m_pct||0;
      if(!best||r>best.r) best={sym:s.symbol,r:r};
      if(!worst||r<worst.r) worst={sym:s.symbol,r:r};
    });
  });
  var html='<div class="fade" style="padding:6px 0 24px">';
  html+='<div style="font-size:15px;font-weight:700;margin-bottom:4px;font-family:var(--sans)">📅 Weekly Digest</div>';
  html+='<div style="font-size:11px;color:var(--muted);margin-bottom:12px;font-family:var(--sans)">';
  html+=weekHist.length ? fmtD(monStr)+' — '+fmtD(friStr) : 'Last '+totalDays+' trading days';
  html+='</div>';
  html+='<div class="dstats">';
  html+='<div class="dstat"><div class="dstat-v">'+totalDays+'</div><div class="dstat-l">Days</div></div>';
  html+='<div class="dstat"><div class="dstat-v" style="color:var(--accent)">'+Object.keys(freq).length+'</div><div class="dstat-l">Stocks</div></div>';
  html+='<div class="dstat"><div class="dstat-v" style="color:var(--prime)">'+sitC.prime+'</div><div class="dstat-l">Prime</div></div>';
  html+='<div class="dstat"><div class="dstat-v" style="color:var(--hold)">'+sitC.hold+'</div><div class="dstat-l">Hold</div></div>';
  html+='</div>';
  if(weekPrime.length>0){
    html+='<div class="dcard"><div class="dcard-title">🎯 Prime Entries This Week</div>';
    var seen={};
    weekPrime.forEach(function(s){
      if(seen[s.symbol]) return; seen[s.symbol]=1;
      var r3=s.return_3m_pct||0;
      html+='<div class="drow"><div><div class="dsym">'+s.symbol+'</div><div class="dmeta">Score '+Math.round(s.score||0)+'/10</div></div>'
        +'<div class="dret '+(r3>=0?'rp':'rn')+'">'+(r3>=0?'+':'')+r3.toFixed(1)+'%</div></div>';
    });
    html+='</div>';
  }
  if(best||worst){
    html+='<div class="dcard"><div class="dcard-title">🏆 Week Highlights</div>';
    if(best) html+='<div class="drow"><div><div class="dsym">📈 '+best.sym+'</div><div class="dmeta">Best 3M performer</div></div><div class="dret rp">+'+best.r.toFixed(1)+'%</div></div>';
    if(worst&&worst.sym!==best.sym) html+='<div class="drow"><div><div class="dsym">📉 '+worst.sym+'</div><div class="dmeta">Weakest 3M</div></div><div class="dret rn">'+worst.r.toFixed(1)+'%</div></div>';
    html+='</div>';
  }
  if(consistent.length>0){
    html+='<div class="dcard"><div class="dcard-title">🔥 Most Consistent (5d+)</div>';
    consistent.forEach(function(sym){
      html+='<div class="drow"><div class="dsym">'+sym+'</div><div style="font-family:var(--mono);font-size:12px;color:var(--hold);font-weight:700">'+freq[sym]+'d</div></div>';
    });
    html+='</div>';
  }
  var sitLbls={prime:'🎯 Prime',hold:'💰 Hold',watch:'👀 Watch',book:'⚠️ Book',avoid:'🚫 Avoid'};
  var sitEntries=Object.keys(sitC).filter(function(k){ return sitC[k]>0&&weekHist.length>0; });
  if(sitEntries.length>0){
    html+='<div class="dcard"><div class="dcard-title">📊 This Week by Situation</div>';
    sitEntries.forEach(function(k){
      html+='<div class="drow"><div>'+sitLbls[k]+'</div><div style="font-family:var(--mono);font-weight:700">'+sitC[k]+'</div></div>';
    });
    html+='</div>';
  }
  html+='<div style="text-align:center;padding:8px 0;font-size:11px;color:var(--muted);font-family:var(--sans)">Based on last '+totalDays+' trading days</div>';
  html+='</div>';
  el.innerHTML=html;
}
