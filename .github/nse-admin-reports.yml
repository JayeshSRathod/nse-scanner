name: NSE Admin Reports

on:
  workflow_dispatch:
    inputs:
      report:
        description: "Which report to run"
        required: true
        default: both
        type: choice
        options:
          - health
          - users
          - both
  schedule:
    # 11:30 PM IST weekdays
    - cron: "0 18 * * 1-5"
    # 11:35 PM IST weekdays
    - cron: "5 18 * * 1-5"

permissions:
  contents: read

concurrency:
  group: nse-admin-reports
  cancel-in-progress: false

jobs:
  admin-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
      DB_PATH: nse_scanner.db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Select report mode
        id: mode
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            MODE="${{ inputs.report }}"
          elif [[ "${{ github.event.schedule }}" == "0 18 * * 1-5" ]]; then
            MODE="health"
          elif [[ "${{ github.event.schedule }}" == "5 18 * * 1-5" ]]; then
            MODE="users"
          else
            MODE="both"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Running mode: $MODE"

      - name: Run admin report
        run: |
          case "${{ steps.mode.outputs.mode }}" in
            health) python nse_admin_report.py --health ;;
            users)  python nse_admin_report.py --users ;;
            both)   python nse_admin_report.py --both ;;
            *)      echo "Unknown mode" && exit 1 ;;
          esac
